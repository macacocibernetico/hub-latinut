<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUB LATINUT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg:#f5f5f7;
  --bg2:#ffffff;
  --bg3:#f0f0f2;
  --bg4:#e8e8ed;
  --border:#d2d2d7;
  --border2:#c7c7cc;
  --text:#1d1d1f;
  --text2:#424245;
  --text3:#86868b;
  --accent:#0071e3;
  --accent-dim:#0077ed;
  --accent-light:#e8f2fd;
  --danger:#ff3b30;
  --danger-light:#fff0ef;
  --warn:#ff9500;
  --warn-light:#fff8ee;
  --ok:#34c759;
  --ok-light:#edfaf1;
  --info:#0071e3;
  --font:'Inter',sans-serif;
  --mono:'DM Mono',monospace;
  --radius:10px;
  --radius-lg:14px;
  --radius-xl:18px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 4px 20px rgba(0,0,0,.1),0 1px 3px rgba(0,0,0,.06);
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}

/* LAYOUT */
.shell{display:flex;min-height:100vh;}
.sidebar{width:240px;min-height:100vh;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:10;}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}

/* SIDEBAR */
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.logo-text{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.4px;}
.logo-sub{font-size:11px;color:var(--text3);letter-spacing:0.2px;margin-top:2px;}
.nav{padding:10px 0;flex:1;overflow-y:auto;}
.nav-section{padding:0 10px;margin-bottom:4px;}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.5px;color:var(--text3);padding:10px 10px 4px;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius);color:var(--text2);font-size:13px;font-weight:400;cursor:pointer;transition:all .15s;position:relative;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent);color:#fff;}
.nav-item.active .nav-badge{background:rgba(255,255,255,.25);color:#fff;}
.nav-item .icon{width:16px;text-align:center;font-size:13px;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-family:var(--mono);padding:1px 7px;border-radius:20px;font-weight:600;}
.nav-badge.warn{background:var(--warn);}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--border);}
.sheet-status{font-size:11px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:6px;}
.sheet-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0;}
.sheet-dot.err{background:var(--danger);}
.sheet-dot.loading{background:var(--warn);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.auth-status{margin-top:5px;font-size:11px;font-family:var(--mono);color:var(--text3);}
.auth-btn{margin-top:8px;width:100%;padding:7px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font);}
.auth-btn:hover{background:var(--bg4);color:var(--text);}
.auth-btn.connected{border-color:var(--ok);color:var(--ok);background:var(--ok-light);}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:5;}
.topbar-title{font-size:17px;font-weight:600;letter-spacing:-0.3px;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid var(--border);background:var(--bg2);color:var(--text2);box-shadow:var(--shadow);}
.btn:hover{background:var(--bg3);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 1px 3px rgba(0,113,227,.3);}
.btn.primary:hover{background:var(--accent-dim);}
.last-sync{font-size:11px;color:var(--text3);font-family:var(--mono);}

/* CONTENT */
.content{padding:20px 24px;flex:1;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:8px;letter-spacing:0.1px;}
.stat-value{font-size:28px;font-weight:600;font-family:var(--mono);line-height:1;letter-spacing:-1px;color:var(--text);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.stat-card.alert-card{border-color:rgba(255,59,48,.2);background:var(--danger-light);}
.stat-card.warn-card{border-color:rgba(255,149,0,.2);background:var(--warn-light);}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;}
.section-count{font-family:var(--mono);font-size:11px;color:var(--text3);}

/* ALERT CARDS */
.alert-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.alert-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:all .15s;box-shadow:var(--shadow);}
.alert-item:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px);}
.alert-item.critical{border-left:3px solid var(--danger);}
.alert-item.warning{border-left:3px solid var(--warn);}
.alert-item.info{border-left:3px solid var(--accent);}
.alert-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.alert-dot.critical{background:var(--danger);}
.alert-dot.warning{background:var(--warn);}
.alert-dot.info{background:var(--accent);}
.alert-body{flex:1;min-width:0;}
.alert-title{font-size:13px;font-weight:600;margin-bottom:2px;color:var(--text);}
.alert-meta{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:8px;}
.alert-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:20px;font-weight:500;background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.tag.customer{background:var(--accent-light);color:var(--accent);border-color:rgba(0,113,227,.15);}
.tag.vessel{background:var(--ok-light);color:#1a8f40;border-color:rgba(52,199,89,.2);}
.tag.port{background:#f5f0ff;color:#6e3ab0;border-color:rgba(110,58,176,.15);}
.tag.naviera{background:#f0f4ff;color:#3a56b0;border-color:rgba(58,86,176,.15);}
.tag.days-red{background:var(--danger-light);color:var(--danger);border-color:rgba(255,59,48,.2);}
.tag.days-warn{background:var(--warn-light);color:#b06a00;border-color:rgba(255,149,0,.2);}
.tag.days-ok{background:var(--ok-light);color:#1a8f40;border-color:rgba(52,199,89,.2);}

/* LOGISTICS GRID */
.alert-logistics{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 20px;margin-bottom:10px;background:var(--bg3);border-radius:8px;padding:8px 12px;border:1px solid var(--border);}
.log-item{font-size:10px;font-family:var(--mono);}
.log-label{color:var(--text3);margin-right:4px;}
.log-value{color:var(--text2);font-weight:500;}

/* STATUS LABELS */
.status-label{font-size:11px;font-family:var(--mono);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.status-label.ok{color:#1a8f40;}
.status-label.warn{color:#b06a00;}
.status-label.danger{color:var(--danger);}
.status-label.info{color:var(--accent);}

/* RECLAMO */
.alert-reclamo{font-size:11px;font-family:var(--mono);color:#b06a00;margin-bottom:8px;padding:6px 10px;background:var(--warn-light);border-radius:6px;border:1px solid rgba(255,149,0,.2);}

/* ACTION BUTTONS */
.alert-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.action-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--radius);cursor:pointer;transition:all .15s;font-family:var(--font);border:1px solid;display:inline-flex;align-items:center;gap:5px;}
.action-btn.write,.action-btn.primary-action{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 1px 3px rgba(0,113,227,.25);}
.action-btn.write:hover,.action-btn.primary-action:hover{background:var(--accent-dim);}
.action-btn.secondary-action,.action-btn.mail{background:var(--bg2);color:var(--text2);border-color:var(--border);box-shadow:var(--shadow);}
.action-btn.secondary-action:hover,.action-btn.mail:hover{background:var(--bg3);}
.action-btn.success-action{background:var(--ok-light);color:#1a8f40;border-color:rgba(52,199,89,.3);}
.action-btn.success-action:hover{background:#daf5e4;}
.action-btn.info-action{background:var(--accent-light);color:var(--accent);border-color:rgba(0,113,227,.2);}
.action-btn.info-action:hover{background:#d4e8fb;}

/* DAYS BADGE */
.alert-right{text-align:right;flex-shrink:0;}
.days-badge{font-size:26px;font-weight:600;font-family:var(--mono);line-height:1;letter-spacing:-1px;}
.days-badge.red{color:var(--danger);}
.days-badge.warn{color:var(--warn);}
.days-badge.ok{color:var(--ok);}
.days-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:3px;font-weight:500;}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:24px;box-shadow:var(--shadow);}
.table-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.table-wrap table{width:100%;border-collapse:collapse;}
.table-wrap thead th{font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);font-weight:600;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg3);}
.table-wrap tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.table-wrap tbody tr:last-child{border-bottom:none;}
.table-wrap tbody tr:hover{background:var(--bg3);}
.table-wrap td{padding:10px 12px;font-size:12px;vertical-align:middle;color:var(--text2);}
.table-wrap td.mono{font-family:var(--mono);font-size:11px;}
.doc-status{display:inline-flex;align-items:center;gap:5px;}
.doc-dot{width:5px;height:5px;border-radius:50%;}
.doc-dot.red{background:var(--danger);}
.doc-dot.green{background:var(--ok);}
.doc-text{color:var(--text3);font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);}
.pagare-status{font-size:11px;font-family:var(--mono);}
.pagare-status.enviado{color:#1a8f40;}
.pagare-status.pendiente{color:#b06a00;}
.row-action{font-size:11px;color:var(--text3);cursor:pointer;padding:5px 10px;border:1px solid var(--border);border-radius:7px;font-family:var(--font);font-weight:500;transition:all .15s;background:var(--bg2);}
.row-action:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-xl);width:560px;max-width:95vw;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
.modal-title{font-size:14px;font-weight:600;color:var(--text);}
.modal-header-right{display:flex;align-items:center;gap:10px;}
.modal-close{font-size:20px;color:var(--text3);cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--bg4);transition:all .15s;line-height:1;}
.modal-close:hover{background:var(--border);color:var(--text);}
.lang-toggle{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;background:var(--bg4);}
.lang-btn{padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;background:transparent;color:var(--text3);border:none;font-family:var(--font);transition:all .15s;}
.lang-btn.active{background:var(--accent);color:#fff;}
.modal-body{padding:18px 20px;}
.mail-field{margin-bottom:12px;}
.mail-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);margin-bottom:5px;font-weight:600;}
.mail-value{font-size:11px;font-family:var(--mono);color:var(--text2);background:var(--bg3);padding:7px 10px;border-radius:7px;border:1px solid var(--border);}
.mail-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 10px;resize:vertical;min-height:140px;line-height:1.6;transition:border-color .15s;}
.mail-textarea:focus{outline:none;border-color:var(--accent);background:var(--bg2);}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--bg3);}

/* CONFIG */
.config-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
.config-title{font-size:13px;font-weight:600;margin-bottom:3px;color:var(--text);}
.config-desc{font-size:11px;color:var(--text3);margin-bottom:14px;}
.config-field{margin-bottom:10px;}
.config-label{font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:500;}
.config-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;transition:border-color .15s;}
.config-input:focus{outline:none;border-color:var(--accent);background:var(--bg2);}
.config-save{display:flex;justify-content:flex-end;margin-top:10px;}

/* SPINNER / EMPTY */
.spinner{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text3);font-size:12px;gap:10px;}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:60px;text-align:center;color:var(--text3);font-size:13px;}
.empty-icon{font-size:28px;margin-bottom:12px;opacity:.4;}

/* LIB CHECKBOX */
.lib-checkbox{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:3px;}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:10px;font-weight:500;font-size:12px;z-index:999;transition:opacity .3s;pointer-events:none;box-shadow:var(--shadow-lg);}

/* MOBILE */
.mobile-toggle{display:none;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:15px;color:var(--text2);}
.overlay-close{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,.3);}

@media(max-width:768px){
  .mobile-toggle{display:flex;}
  .sidebar{transform:translateX(-240px);transition:transform .2s ease;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .stats-row{grid-template-columns:1fr 1fr;gap:8px;}
  .content{padding:14px 16px;}
  .topbar{padding:12px 16px;}
  .alert-logistics{grid-template-columns:1fr;}
  .modal{width:95vw;}
  .modal-body{padding:14px 16px;}
  .modal-footer{padding:12px 16px;}
}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-text">LATINUT</div>
    <div class="logo-sub">Hub de Control</div>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <div class="nav-label">Operaciones</div>
      <div class="nav-item active" onclick="showView('alertas')">
        <span class="icon">⚡</span> Alertas
        <span class="nav-badge" id="badge-alertas"></span>
      </div>
      <div class="nav-item" onclick="showView('cargas')">
        <span class="icon">📦</span> Cargas AXT
      </div>
      <div class="nav-item" onclick="showView('nueva_carga')">
        <span class="icon">＋</span> Nueva Carga
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Finanzas</div>
      <div class="nav-item" onclick="showView('cobranza')">
        <span class="icon">💰</span> Cobranza
        <span class="nav-badge warn" id="badge-cobranza"></span>
      </div>
      <div class="nav-item" onclick="showView('liberaciones')">
        <span class="icon">🔓</span> Liberaciones
        <span class="nav-badge warn" id="badge-liberaciones"></span>
      </div>
      <div class="nav-item" onclick="showView('pagares')">
        <span class="icon">📄</span> Pagarés
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Historial</div>
      <div class="nav-item" onclick="showView('log')">
        <span class="icon">📋</span> Log de acciones
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Sistema</div>
      <div class="nav-item" onclick="showView('config')">
        <span class="icon">⚙</span> Configuración
      </div>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="sheet-status">
      <span class="sheet-dot" id="sheet-dot"></span>
      <span id="sheet-status-text">Cargando...</span>
    </div>
    <div class="auth-status" id="auth-status">
      <span id="auth-status-text" style="color:var(--muted)">● Sin autenticar</span>
    </div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Conectar con Google</button>
  </div>
</aside>
<div class="overlay-close" id="overlay-close" onclick="closeSidebar()"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="mobile-toggle" onclick="toggleSidebar()">☰</span>
      <span class="topbar-title" id="view-title">Alertas</span>
    </div>
    <div class="topbar-right">
      <span class="last-sync" id="last-sync">—</span>
      <button class="btn primary" onclick="loadData()">↻ Sincronizar</button>
    </div>
  </div>
  <div class="content" id="content">
    <div class="spinner"><div class="spin"></div> Cargando datos...</div>
  </div>
</main>
</div>

<!-- MODAL MAIL -->
<div class="modal-overlay hidden" id="mail-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Crear borrador</span>
      <div class="modal-header-right">
        <div class="lang-toggle">
          <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="lang-es" onclick="setLang('es')">ES</button>
        </div>
        <span class="modal-close" onclick="closeModal()">×</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="mail-field"><div class="mail-label">Para</div><div class="mail-value" id="modal-to">—</div></div>
      <div class="mail-field"><div class="mail-label">CC</div><div class="mail-value" id="modal-cc">—</div></div>
      <div class="mail-field"><div class="mail-label">Asunto</div><div class="mail-value" id="modal-subject">—</div></div>
      <div class="mail-field"><div class="mail-label">Cuerpo</div><textarea class="mail-textarea" id="modal-body" rows="8"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="send-draft-btn" onclick="sendDraft()">✉ Crear borrador en Gmail</button>
    </div>
  </div>
</div>

<script>

// ─── CONTACTS ────────────────────────────────────────────────────────────────
async function loadContacts(){
  if(!cfg.hubSheetId||!cfg.apiKey) return;
  try{
    const range=encodeURIComponent('CONTACTOS!A2:E');
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.hubSheetId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    if(!r.ok) return;
    const data=await r.json();
    contacts=(data.values||[]).map(row=>({
      empresa:(row[0]||'').trim(),
      contacto:(row[1]||'').trim(),
      email:(row[2]||'').trim(),
      rol:(row[3]||'').trim(),
      ccSiempre:(row[4]||'').trim().toUpperCase()==='SI'
    })).filter(c=>c.email);
    console.log(`Loaded ${contacts.length} contacts`);
  }catch(e){console.error('Error loading contacts',e);}
}

function getContactsForEmpresa(empresa){
  if(!empresa||!contacts.length) return {to:'', cc:'pedro@axt.com'};
  const emp=empresa.trim().toUpperCase();
  const match=contacts.filter(c=>c.empresa.toUpperCase()===emp);
  const principal=match.filter(c=>c.rol.toLowerCase().includes('principal'));
  const cc=contacts.filter(c=>c.ccSiempre).map(c=>c.email);
  // To: principal o primero que matchea
  const toContact=principal[0]||match[0];
  const toStr=toContact?`${toContact.contacto} <${toContact.email}>`:'';
  // CC: los que tienen CC_Siempre + otros contactos no principales
  const otherEmails=match.filter(c=>c!==toContact&&!c.ccSiempre).map(c=>c.email);
  const allCC=[...new Set([...cc,...otherEmails])];
  return{to:toStr, cc:allCC.join(', ')||'pedro@axt.com'};
}

// ─── LOG CACHE ───────────────────────────────────────────────────────────────
async function loadLog(){
  if(!cfg.hubSheetId||!cfg.apiKey) return;
  try{
    const range=encodeURIComponent('LOG!A:I');
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.hubSheetId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    if(!r.ok) return;
    const data=await r.json();
    logRows=(data.values||[]).slice(1); // Skip header
    console.log(`Loaded ${logRows.length} log entries`);
  }catch(e){console.error('Error loading log',e);}
}

function getReclamoInfoFromLog(bl, mailType){
  if(!logRows.length) return null;
  const accion=mailType.replace(/_/g,' ');
  // col 5=BL, col 7=Accion (0-indexed: Fecha,Hora,Fuente,FC,FCServ,BL,Customer,Accion,Detalle)
  const matches=logRows.filter(r=>(r[5]||'').trim()===bl&&(r[7]||'').toLowerCase().includes(accion.toLowerCase().split(' ')[0]));
  if(!matches.length) return null;
  // Get last entry date
  const last=matches[matches.length-1];
  const lastDateStr=(last[0]||'')+' '+(last[1]||'');
  const hoursAgo=Math.round((Date.now()-new Date(last[0].split('/').reverse().join('-')+' '+last[1]).getTime())/3600000);
  const timeStr=isNaN(hoursAgo)?'recientemente':hoursAgo<24?`hace ${hoursAgo}h`:`hace ${Math.round(hoursAgo/24)}d`;
  return{count:matches.length, timeStr};
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function parseDate(v){
  if(!v) return null;
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(v)){const[dd,mm,yy]=v.split('/');const d=new Date(+yy,+mm-1,+dd);return isNaN(d)?null:d;}
  if(/^\d{4}-\d{2}-\d{2}/.test(v)){const d=new Date(v);return isNaN(d)?null:d;}
  const d=new Date(v);return isNaN(d)?null:d;
}
function daysFrom(v){const d=parseDate(v);if(!d)return null;return Math.round((d-new Date())/86400000);}
function fmtDate(v){const d=parseDate(v);if(!d)return v||'—';return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function isClosed(row){return(row[COL.FECHA_EST_COBRO]||'').trim().toUpperCase()==='SI'&&(row[COL.FECHA_COBRO]||'').trim()!=='';}
function daysClass(n){if(n===null)return '';if(n<=7)return 'red';if(n<=14)return 'warn';return 'ok';}
function nowStr(){const n=new Date();return{fecha:n.toLocaleDateString('es-AR'),hora:n.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})};}

function getInvoiceInfo(row){
  const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
  const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();
  const customer=(row[COL.CUSTOMER]||'—').trim();
  if(inv1&&inv2) return `Invoice (${customer}): ${inv1}\nFC Servicios (${customer}): ${inv2}`;
  if(inv1) return `Invoice (${customer}): ${inv1}`;
  if(inv2) return `FC Servicios (${customer}): ${inv2}`;
  return '';
}

// ─── APPS SCRIPT BRIDGE ──────────────────────────────────────────────────────
async function callAppScript(accion, filaInicio, filaFin){
  const url = cfg.appsScriptUrl;
  if(!url){ alert('URL del AppScript no configurada.'); return false; }
  try{
    const params = new URLSearchParams({accion, filaInicio, filaFin: filaFin||filaInicio});
    const r = await fetch(url + '?' + params.toString(), {
      method: 'GET',
      redirect: 'follow'
    });
    const data = await r.json();
    if(data.ok){
      showToast('✓ Acción ejecutada correctamente');
      return true;
    } else {
      console.error('AppScript error:', data.error);
      alert('Error: ' + (data.error||'desconocido'));
      return false;
    }
  } catch(e){
    console.error('callAppScript error:', e);
    alert('Error al conectar con el AppScript. Verificá que esté publicado correctamente.');
    return false;
  }
}

// ─── GOOGLE AUTH ─────────────────────────────────────────────────────────────
function initGoogleAuth(){
  if(!cfg.clientId) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: cfg.clientId,
    scope: SCOPES,
    callback: (resp) => {
      if(resp.error) { console.error(resp); return; }
      accessToken = resp.access_token;
      updateAuthUI(true);
      loadData();
    }
  });
}

function handleAuth(){
  if(accessToken){
    // Desconectar
    google.accounts.oauth2.revoke(accessToken, ()=>{
      accessToken=null;
      updateAuthUI(false);
    });
  } else {
    if(!cfg.clientId){ alert('Primero configurá el Client ID en Configuración.'); return; }
    tokenClient.requestAccessToken();
  }
}

function updateAuthUI(connected){
  const txt=document.getElementById('auth-status-text');
  const btn=document.getElementById('auth-btn');
  if(connected){
    txt.textContent='● Conectado con Google';
    txt.style.color='var(--ok)';
    btn.textContent='Desconectar';
    btn.className='auth-btn connected';
  } else {
    txt.textContent='● Sin autenticar';
    txt.style.color='var(--muted)';
    btn.textContent='Conectar con Google';
    btn.className='auth-btn';
  }
}

// ─── DATA ────────────────────────────────────────────────────────────────────
async function loadData(){
  if(!cfg.sheetId||!cfg.apiKey){showConfigPrompt();return;}
  setSheetStatus('loading','Sincronizando...');
  try{
    const range=encodeURIComponent(`${cfg.sheetName}!A4:BI`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    const rawRows=(data.values||[]);
    allRows=rawRows.map((row,i)=>{row._sheetRow=i+4;return row;}).filter(row=>row[COL.NEGOCIO]&&!isClosed(row));
    await loadContacts();
    await loadLog();
    setSheetStatus('ok',`${allRows.length} cargas activas`);
    document.getElementById('last-sync').textContent='Sync '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    updateBadges();renderView(currentView);
  }catch(e){setSheetStatus('err','Error de conexión');console.error(e);}
}

function setSheetStatus(state,text){
  const dot=document.getElementById('sheet-dot');
  dot.className='sheet-dot'+(state==='err'?' err':state==='loading'?' loading':'');
  document.getElementById('sheet-status-text').textContent=text;
}

// ─── WRITE TO SHEET ───────────────────────────────────────────────────────────
async function writeCell(row, col, value){
  if(!accessToken){alert('Conectate con Google primero para escribir en la planilla.');return false;}
  // row es 0-based en allRows, datos empiezan en fila 4 del sheet (filas 1-3 son headers)
  // allRows filtra por isClosed, entonces necesitamos encontrar la fila real
  // La API devuelve datos desde A4, entonces allRows[0] = fila 4, allRows[1] = fila 5, etc.
  // Use stored _sheetRow if available (accounts for filtered rows)
  const sheetRow = allRows[row]&&allRows[row]._sheetRow ? allRows[row]._sheetRow : row + 4;
  const colLetter = String.fromCharCode(65 + col);
  const range = encodeURIComponent(`${cfg.sheetName}!${colLetter}${sheetRow}`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${range}?valueInputOption=USER_ENTERED`;
  const r = await fetch(url, {
    method: 'PUT',
    headers: {'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
    body: JSON.stringify({values:[[value]]})
  });
  return r.ok;
}

async function appendLog(data){
  if(!accessToken) return;
  const {fecha,hora}=nowStr();
  const hubId=cfg.hubSheetId||cfg.sheetId;
  const values=[[fecha, hora, data.fuente||'AXT', data.fc||'', data.fcServ||'', data.bl||'', data.customer||'', data.accion||'', data.detalle||'']];
  const range=encodeURIComponent(`LOG!A:I`);
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${hubId}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  await fetch(url,{
    method:'POST',
    headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
    body:JSON.stringify({values})
  });
}

// ─── GMAIL DRAFT ─────────────────────────────────────────────────────────────
async function createGmailDraft(to, cc, subject, body){
  if(!accessToken){
    // Fallback: copiar al portapapeles
    try{await navigator.clipboard.writeText(`Para: ${to}\nCC: ${cc}\nAsunto: ${subject}\n\n${body}`);}catch(e){}
    alert('✓ Contenido copiado al portapapeles.\n\nConectate con Google para crear drafts reales en Gmail.');
    return false;
  }
  const email = [`To: ${to}`, `Cc: ${cc}`, `Subject: ${subject}`, `Content-Type: text/plain; charset=utf-8`, ``, body].join('\r\n');
  const encoded = btoa(unescape(encodeURIComponent(email))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const r = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
    method: 'POST',
    headers: {'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
    body: JSON.stringify({message:{raw:encoded}})
  });
  if(r.ok){
    showToast('✓ Borrador creado en Gmail');
    return true;
  }
  return false;
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--ok);color:#0d0d0d;padding:10px 18px;border-radius:8px;font-weight:700;font-size:12px;z-index:999;transition:opacity .3s;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',3000);
}

// ─── ALERTS ──────────────────────────────────────────────────────────────────
function getAlerts(){
  const alerts=[];
  allRows.forEach((row,idx)=>{
    const eta=parseDate(row[COL.ETA]);
    const dETA=eta?Math.round((eta-new Date())/86400000):null;
    const customer=(row[COL.CUSTOMER]||'—').trim();
    const vessel=(row[COL.VESSEL]||'—').trim();
    const port=(row[COL.PORT]||'—').trim();
    const bl=(row[COL.BL]||'—').trim();
    const booking=(row[COL.BOOKING]||'—').trim();
    const containers=(row[COL.CONTAINERS]||'—').trim();
    const shipping=(row[COL.SHIPPING]||'—').trim();
    const negocio=(row[COL.NEGOCIO]||'—').trim();
    const product=(row[COL.PRODUCT]||'—').trim();
    const invoiceInfo=getInvoiceInfo(row);
    const paymentDueFmt=fmtDate(row[COL.FECHA_EST_COBRO]);
    const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
    const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();

    const detail={negocio,product,bl,booking,containers,shipping,vessel,port,
      etaFmt:fmtDate(row[COL.ETA]),customer,paymentDueFmt,invoiceInfo,
      docsNote:(row[COL.DOCUMENTOS]||'').trim(),inv1,inv2};
    const logistics={containers,booking,bl,shipping};

    // ETA próximo
    if(dETA!==null&&dETA<=cfg.alerta_dias){
      const level=dETA<=7?'critical':'warning';
      const etaLabel=dETA<0?`Llegó hace ${Math.abs(dETA)}d`:dETA===0?'Llega HOY':`Llega en ${dETA}d`;
      const telexStatus=(row[COL.TELEX]||'').trim();
      const recInfo=getReclamoInfoFromLog(bl,'reclamo_pago');
      alerts.push({level,dETA,rowIdx:idx,
        title:`Arribo próximo — ${customer}`,
        meta:`${negocio}  ·  ETA: ${fmtDate(row[COL.ETA])}`,
        tags:[{label:customer,cls:'customer'},{label:vessel,cls:'vessel'},{label:port,cls:'port'},{label:shipping,cls:'naviera'},{label:etaLabel,cls:'days-'+daysClass(dETA)}],
        logistics,detail,recInfo,
        telexStatus,
        actions:[
          {label:'✉ Reclamo de pago',mailType:'reclamo_pago'},
          {label:'✉ Envío docs',mailType:'envio_docs'},
          {label:'✉ Shipment Advice',mailType:'shipment_advice'},
          {label:'📋 Solicitar liberación',mailType:'solicitar_liberacion',isWrite:true}
        ]
      });
    }

    // Docs pendientes
    const docs=(row[COL.DOCUMENTOS]||'').trim();
    if(docs&&docs.toUpperCase()!=='SI'&&dETA!==null&&dETA<=20){
      alerts.push({level:'warning',rowIdx:idx,
        title:`Docs pendientes — ${customer}`,
        meta:`${negocio}  ·  BL: ${bl}  ·  ETA: ${fmtDate(row[COL.ETA])}`,
        tags:[{label:customer,cls:'customer'},{label:product,cls:'vessel'}],
        logistics,docsText:docs,detail,
        actions:[{label:'✉ Solicitar docs',mailType:'solicitar_docs'}]
      });
    }

    // Pagaré pendiente
    const pagEnv=(row[COL.PAGARE_ENVIADO]||'').trim().toUpperCase();
    if(pagEnv!=='SI'&&dETA!==null&&dETA<=30){
      const recInfo=getReclamoInfoFromLog(bl,'solicitar_pagare');
      alerts.push({level:'info',rowIdx:idx,
        title:`Pagaré pendiente — ${customer}`,
        meta:`${negocio}  ·  BL: ${bl}  ·  ETA: ${fmtDate(row[COL.ETA])}`,
        tags:[{label:customer,cls:'customer'},{label:'Pagaré no enviado',cls:'days-warn'}],
        logistics,detail,recInfo,
        actions:[{label:'✉ Solicitar pagaré',mailType:'solicitar_pagare'}]
      });
    }

    // Cobro estimado
    const fechaEst=row[COL.FECHA_EST_COBRO];
    const dCobro=daysFrom(fechaEst);
    if(dCobro!==null&&dCobro<=14&&dCobro>=-30){
      const level2=dCobro<=0?'critical':'warning';
      const invoiceTitle=inv1&&inv2?`${inv1} / ${inv2}`:inv1||inv2||negocio;
      const cardTitle=`Cobro estimado — ${invoiceTitle} · ${customer}`;
      const invLogLine=inv1&&inv2
        ?`<div class="log-item"><span class="log-label">Invoice:</span><span class="log-value">${inv1}</span></div><div class="log-item"><span class="log-label">FC Servicios:</span><span class="log-value">${inv2}</span></div>`
        :inv1?`<div class="log-item"><span class="log-label">Invoice:</span><span class="log-value">${inv1}</span></div>`
        :inv2?`<div class="log-item"><span class="log-label">FC Servicios:</span><span class="log-value">${inv2}</span></div>`:'';
      const recInfo=getReclamoInfoFromLog(bl,'reclamo_cobro');
      alerts.push({level:level2,rowIdx:idx,
        title:cardTitle,
        meta:`Payment due: ${fmtDate(fechaEst)}  ·  BL: ${bl}`,
        tags:[{label:customer,cls:'customer'},{label:dCobro<=0?`Vencido hace ${Math.abs(dCobro)}d`:`En ${dCobro}d`,cls:'days-'+daysClass(dCobro)}],
        logistics,detail,invLogLine,recInfo,
        actions:[{label:'✉ Reclamo de cobro',mailType:'reclamo_cobro'}]
      });
    }
  });
  return alerts.sort((a,b)=>({critical:0,warning:1,info:2}[a.level]||2)-({critical:0,warning:1,info:2}[b.level]||2));
}

function updateBadges(){
  const alerts=getAlerts();
  const crit=alerts.filter(a=>a.level==='critical'||a.level==='warning').length;
  const bA=document.getElementById('badge-alertas');
  bA.textContent=crit||'';bA.style.display=crit?'':'none';
  const cobros=allRows.filter(r=>{const d=daysFrom(r[COL.FECHA_EST_COBRO]);return d!==null&&d<=14;}).length;
  const bC=document.getElementById('badge-cobranza');
  bC.textContent=cobros||'';bC.style.display=cobros?'':'none';
  const libs=allRows.filter(r=>{const d=daysFrom(r[COL.ETA]);const t=(r[COL.TELEX]||'').trim();return d!==null&&d>=0&&d<=7&&t.toUpperCase()!=='SI';}).length;
  const bL=document.getElementById('badge-liberaciones');
  if(bL){bL.textContent=libs||'';bL.style.display=libs?'':'none';}
}

function renderAlertas(){
  const alerts=getAlerts();
  const critCount=alerts.filter(a=>a.level==='critical').length;
  const warnCount=alerts.filter(a=>a.level==='warning').length;
  const proxETA=allRows.filter(r=>{const d=daysFrom(r[COL.ETA]);const telex=(r[COL.TELEX]||'').trim();return d!==null&&d>=0&&d<=7&&telex==='';}).length;
  let html=`<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Cargas activas</div><div class="stat-value">${allRows.length}</div><div class="stat-sub">AXT Solutions</div></div>
    <div class="stat-card alert-card"><div class="stat-label">Alertas críticas</div><div class="stat-value" style="color:var(--danger)">${critCount}</div><div class="stat-sub">Acción urgente</div></div>
    <div class="stat-card warn-card"><div class="stat-label">Advertencias</div><div class="stat-value" style="color:var(--warn)">${warnCount}</div><div class="stat-sub">A monitorear</div></div>
    <div class="stat-card"><div class="stat-label">ETA próximos 7d</div><div class="stat-value" style="color:var(--info)">${proxETA}</div><div class="stat-sub">Sin liberación solicitada</div></div>
  </div>`;
  if(!alerts.length){html+=`<div class="empty"><div class="empty-icon">✓</div>Sin alertas activas. Todo en orden.</div>`;}
  else{
    html+=`<div class="section-header"><span class="section-title">Requieren atención</span><span class="section-count">${alerts.length} alertas</span></div><div class="alert-list">`;
    alerts.forEach(a=>{
      const tagsHtml=(a.tags||[]).map(t=>`<span class="tag ${t.cls}">${t.label}</span>`).join('');
      const actionsHtml=(a.actions||[]).map(act=>{
        const cls=act.isWrite?'write':'secondary-action';

let cargasShowAll = false;
let cargasFilters = new Set(); // active additional filters
let cargasSort = 'eta'; // 'eta' or 'cobro'

function renderCargas(showAll, toggleFilter, sort){
  if(showAll !== undefined) cargasShowAll = showAll;
  if(toggleFilter !== undefined){
    if(cargasFilters.has(toggleFilter)) cargasFilters.delete(toggleFilter);
    else cargasFilters.add(toggleFilter);
  }
  if(sort !== undefined) cargasSort = sort;

  if(!allRows.length){
    document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">📦</div>Sin cargas. Sincronizá primero.</div>`;
    return;
  }

  // Base filter
  let rows = cargasShowAll
    ? allRows
    : allRows.filter(r => (r[COL.FECHA_COBRO]||'').trim() === '');

  // Additional filters
  if(cargasFilters.has('pagare_envio')){
    rows = rows.filter(r => (r[COL.PAGARE_ENVIADO]||'').trim().toUpperCase() !== 'SI');
  }
  if(cargasFilters.has('pagare_firma')){
    rows = rows.filter(r => {
      const env = (r[COL.PAGARE_ENVIADO]||'').trim().toUpperCase();
      const firm = (r[COL.PAGARE_FIRMADO]||'').trim().toUpperCase();
      return env === 'SI' && firm !== 'SI';
    });
  }
  if(cargasFilters.has('docs_pendientes')){
    rows = rows.filter(r => (r[COL.DOCUMENTOS]||'').trim().toUpperCase() !== 'SI');
  }
  if(cargasFilters.has('telex_pendiente')){
    rows = rows.filter(r => (r[COL.TELEX]||'').trim() === '');
  }

  // Sort
  if(cargasSort === 'cobro'){
    rows = [...rows].sort((a,b) => {
      const da = daysFrom(a[COL.FECHA_EST_COBRO]);
      const db = daysFrom(b[COL.FECHA_EST_COBRO]);
      if(da===null && db===null) return 0;
      if(da===null) return 1;
      if(db===null) return -1;
      return da - db;
    });
  } else {
    rows = [...rows].sort((a,b) => {
      const da = daysFrom(a[COL.ETA]);
      const db = daysFrom(b[COL.ETA]);
      if(da===null && db===null) return 0;
      if(da===null) return 1;
      if(db===null) return -1;
      return da - db;
    });
  }

  const chip = (label, key, active) =>
    `<span onclick="renderCargas(undefined,'${key}')" style="font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:20px;border:1px solid ${active?'var(--accent)':'var(--border2)'};cursor:pointer;background:${active?'var(--accent-light)':'var(--bg2)'};color:${active?'var(--accent)':'var(--text3)'};transition:all .15s;white-space:nowrap;">${label}</span>`;

  const viewChip = (label, active, onclick) =>
    `<span onclick="${onclick}" style="font-size:11px;font-family:var(--mono);padding:4px 12px;border-radius:20px;border:1px solid ${active?'var(--accent)':'var(--border2)'};cursor:pointer;background:${active?'var(--accent)':'var(--bg2)'};color:${active?'#fff':'var(--text3)'};transition:all .15s;">${label}</span>`;

  const sortChip = (label, key) =>
    `<span onclick="renderCargas(undefined,undefined,'${key}')" style="font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:20px;border:1px solid ${cargasSort===key?'var(--info)':'var(--border2)'};cursor:pointer;background:${cargasSort===key?'rgba(0,113,227,.08)':'var(--bg2)'};color:${cargasSort===key?'var(--info)':'var(--text3)'};transition:all .15s;">${label}</span>`;

  let html = `<div class="table-wrap">
    <div class="table-top" style="flex-direction:column;align-items:flex-start;gap:10px;padding:14px 16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;">
        <span style="font-size:13px;font-weight:600;color:var(--text);">${rows.length} cargas</span>
        <div style="display:flex;gap:6px;">
          ${viewChip('Activas', !cargasShowAll, "renderCargas(false)")}
          ${viewChip('Todas', cargasShowAll, "renderCargas(true)")}
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
        <span style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:2px;">Filtrar:</span>
        ${chip('Pagaré sin enviar', 'pagare_envio', cargasFilters.has('pagare_envio'))}
        ${chip('Pagaré sin firmar', 'pagare_firma', cargasFilters.has('pagare_firma'))}
        ${chip('Docs pendientes', 'docs_pendientes', cargasFilters.has('docs_pendientes'))}
        ${chip('TELEX pendiente', 'telex_pendiente', cargasFilters.has('telex_pendiente'))}
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <span style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:2px;">Ordenar:</span>
        ${sortChip('ETA ↑', 'eta')}
        ${sortChip('Cobro ↑', 'cobro')}
      </div>
    </div>
    <div style="overflow-x:auto;">
    <table>
      <thead><tr>
        <th>Negocio</th><th>BL</th><th>Booking</th><th>Naviera</th><th>Customer</th>
        <th>Vessel</th><th>ETA</th><th>Días</th><th>Docs</th><th>TELEX</th>
        <th>Pagaré</th><th>Invoice FC1</th><th>Total FC1</th><th>Invoice FC2</th>
        <th>Total FC2</th><th>Total</th><th>Cobro Est.</th><th></th><th></th>
      </tr></thead>
      <tbody>`;

  rows.forEach((row) => {
    const idx = allRows.indexOf(row);
    const days = daysFrom(row[COL.ETA]);
    const dc = daysClass(days);
    const pagEnv = (row[COL.PAGARE_ENVIADO]||'').trim().toUpperCase();
    const pagFirm = (row[COL.PAGARE_FIRMADO]||'').trim().toUpperCase();
    let pagLabel, pagColor;
    if(pagFirm === 'SI'){ pagLabel='Firmado'; pagColor='var(--ok)'; }
    else if(pagEnv === 'SI'){ pagLabel='Sin firmar'; pagColor='var(--warn)'; }
    else { pagLabel='Sin enviar'; pagColor='var(--danger)'; }

    const docs = (row[COL.DOCUMENTOS]||'').trim();
    const docsOk = docs.toUpperCase() === 'SI';
    const telex = (row[COL.TELEX]||'').trim();
    const telexOk = telex.toUpperCase() === 'SI';

    // FC columns
    const inv1 = (row[COL.INVOICE_CLIENTE]||'').trim();
    const total1Raw = parseFloat((row[28]||'').toString().replace(/[^0-9.-]/g,''));
    const total1 = isNaN(total1Raw) ? '' : total1Raw.toLocaleString('es-AR',{maximumFractionDigits:0});
    const inv2 = (row[COL.INVOICE_FC_SERV]||'').trim();
    const total2Raw = parseFloat((row[31]||'').toString().replace(/[^0-9.-]/g,''));
    const total2 = isNaN(total2Raw) ? '' : total2Raw.toLocaleString('es-AR',{maximumFractionDigits:0});
    const totalCarga = (!isNaN(total1Raw) || !isNaN(total2Raw))
      ? ((isNaN(total1Raw)?0:total1Raw) + (isNaN(total2Raw)?0:total2Raw)).toLocaleString('es-AR',{maximumFractionDigits:0})
      : '—';

    html += `<tr>
      <td class="mono">${(row[COL.NEGOCIO]||'—')}</td>
      <td class="mono">${(row[COL.BL]||'—').substring(0,20)}</td>
      <td class="mono">${(row[COL.BOOKING]||'—').substring(0,14)}</td>
      <td style="color:var(--text3);font-size:11px">${(row[COL.SHIPPING]||'—').substring(0,14)}</td>
      <td style="font-weight:500">${row[COL.CUSTOMER]||'—'}</td>
      <td style="color:var(--text3);font-size:11px">${(row[COL.VESSEL]||'—').substring(0,16)}</td>
      <td class="mono">${fmtDate(row[COL.ETA])}</td>
      <td><span style="color:var(--${dc==='red'?'danger':dc==='warn'?'warn':'ok'});font-family:var(--mono);font-weight:600">${days!==null?days+'d':'—'}</span></td>
      <td><div class="doc-status"><div class="doc-dot ${docsOk?'green':'red'}"></div><span class="doc-text" title="${docs||'Pendiente'}">${docsOk?'OK':docs||'—'}</span></div></td>
      <td><span style="color:${telexOk?'var(--ok)':telex?'var(--info)':'var(--text3)'};font-family:var(--mono);font-size:10px">${telex||'—'}</span></td>
      <td><span style="color:${pagColor};font-size:11px;font-family:var(--mono)">${pagLabel}</span></td>
      <td class="mono" style="color:var(--accent)">${inv1||'—'}</td>
      <td class="mono">${total1?'USD '+total1:'—'}</td>
      <td class="mono" style="color:var(--accent)">${inv2||'—'}</td>
      <td class="mono">${total2?'USD '+total2:'—'}</td>
      <td class="mono" style="font-weight:600;color:var(--text)">${totalCarga!=='—'?'USD '+totalCarga:'—'}</td>
      <td class="mono" style="color:var(--text3)">${fmtDate(row[COL.FECHA_EST_COBRO])}</td>
      <td><button class="row-action" onclick="openMailModal(${idx},'reclamo_pago')">✉</button></td>
      <td><button class="row-action" onclick="renderEditCarga(${idx})">✎ Editar</button></td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  document.getElementById('content').innerHTML = html;
}

async function writeRow(rowData, sheetRow){
  if(!accessToken){ alert('Conectate con Google primero.'); return false; }
  const requests = Object.entries(rowData).map(([col, value]) => {
    const colLetter = colIndexToLetter(parseInt(col));
    return {range: `${cfg.sheetName}!${colLetter}${sheetRow}`, values: [[value]]};
  });
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values:batchUpdate`;
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json'},
    body: JSON.stringify({valueInputOption: 'USER_ENTERED', data: requests})
  });
  return r.ok;
}

async function getSheetId(){
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}?key=${cfg.apiKey}`;
  const r = await fetch(url);
  const data = await r.json();
  const sheet = (data.sheets||[]).find(s => s.properties.title === cfg.sheetName);
  return sheet ? sheet.properties.sheetId : null;
}

async function appendRow(rowData){
  if(!accessToken){ alert('Conectate con Google primero.'); return false; }
  const range = encodeURIComponent(`${cfg.sheetName}!N:N`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${range}?key=${cfg.apiKey}`;
  const r = await fetch(url);
  const data = await r.json();
  const vals = data.values||[];
  let lastPortRow = 3;
  for(let i = 3; i < vals.length; i++){
    if(vals[i] && vals[i][0] && vals[i][0].toString().trim() !== '') lastPortRow = i + 1;
  }
  const newRow = lastPortRow + 1;
  const sheetId = await getSheetId();
  if(sheetId === null){ alert('No se pudo obtener el ID de la hoja.'); return null; }
  const insertUrl = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}:batchUpdate`;
  const insertR = await fetch(insertUrl, {
    method: 'POST',
    headers: {'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json'},
    body: JSON.stringify({requests:[{insertDimension:{range:{sheetId,dimension:'ROWS',startIndex:lastPortRow,endIndex:lastPortRow+1},inheritFromBefore:true}}]})
  });
  if(!insertR.ok){ alert('Error al insertar fila.'); return null; }
  const ok = await writeRow(rowData, newRow);
  if(ok) return newRow;
  return null;
}

function colIndexToLetter(idx){
  let letter = '', n = idx + 1;
  while(n > 0){ const rem=(n-1)%26; letter=String.fromCharCode(65+rem)+letter; n=Math.floor((n-1)/26); }
  return letter;
}

async function solicitarLiberacionBulkViaAppScript(rowIndices){
  if(!rowIndices.length) return;

  const minRow=Math.min(...sheetRows);

    for(let i=0;i<rowIndices.length;i++){

      const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();

    await loadData();

}

  const rows=allRows.filter(r=>{
    const d=daysFrom(r[COL.ETA]);
    return d!==null&&d>=0&&d<=7;
  }).sort((a,b)=>(daysFrom(a[COL.ETA])||999)-(daysFrom(b[COL.ETA])||999));

  if(!rows.length){
    document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">🔓</div>Sin cargas con ETA en los próximos 7 días.</div>`;
    return;
  }

  window._libSelectedRows=new Set();
  window._libRows=rows;

  window.updateLibBulkBar=function(){
    const bar=document.getElementById('lib-bulk-bar');
    if(!bar) return;
    const n=window._libSelectedRows.size;
    if(n>0){bar.style.display='block';bar.textContent='📋 Solicitar liberación ('+n+' seleccionadas)';}
    else{bar.style.display='none';}
  };

  window.toggleLibSelection=function(idx){
    if(window._libSelectedRows.has(idx)) window._libSelectedRows.delete(idx);
    else window._libSelectedRows.add(idx);
    const cb=document.getElementById('lib-cb-'+idx);
    const card=document.getElementById('lib-card-'+idx);
    if(cb) cb.checked=window._libSelectedRows.has(idx);
    if(card) card.style.outline=window._libSelectedRows.has(idx)?'2px solid var(--accent)':'none';
    window.updateLibBulkBar();
  };

  window.requestBulkLiberation=function(){
    if(!window._libSelectedRows.size) return;
    const selected=[...window._libSelectedRows].map(i=>allRows.indexOf(window._libRows[i]));
    solicitarLiberacionBulkViaAppScript(selected);
  };

  let html=`
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Cargas próximas</div><div class="stat-value">${rows.length}</div><div class="stat-sub">ETA ≤ 7 días</div></div>
    <div class="stat-card alert-card"><div class="stat-label">Sin liberación</div><div class="stat-value" style="color:var(--danger)">${rows.filter(r=>!(r[COL.TELEX]||'').trim()).length}</div><div class="stat-sub">TELEX vacío</div></div>
    <div class="stat-card warn-card"><div class="stat-label">En proceso</div><div class="stat-value" style="color:var(--warn)">${rows.filter(r=>{const t=(r[COL.TELEX]||'').trim();return t&&t.toUpperCase()!=='SI';}).length}</div><div class="stat-sub">Solicitado / pendiente</div></div>
    <div class="stat-card"><div class="stat-label">Liberado</div><div class="stat-value" style="color:var(--ok)">${rows.filter(r=>(r[COL.TELEX]||'').trim().toUpperCase()==='SI').length}</div><div class="stat-sub">TELEX = SI</div></div>
  </div>
  <button style="display:none;position:sticky;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:30px;font-weight:600;font-size:13px;cursor:pointer;z-index:20;box-shadow:var(--shadow-lg);border:none;font-family:var(--font);" id="lib-bulk-bar" onclick="requestBulkLiberation()"></button>
  <div class="alert-list">`;

  rows.forEach((row,localIdx)=>{
    const origIdx=allRows.indexOf(row);
    const d=daysFrom(row[COL.ETA]);
    const dc=daysClass(d);
    const telex=(row[COL.TELEX]||'').trim();
    const telexOk=telex.toUpperCase()==='SI';
    const telexPending=telex&&!telexOk;
    const customer=(row[COL.CUSTOMER]||'—').trim();
    const bl=(row[COL.BL]||'').trim();
    const booking=(row[COL.BOOKING]||'').trim();
    const containers=(row[COL.CONTAINERS]||'').trim();
    const shipping=(row[COL.SHIPPING]||'').trim();
    const vessel=(row[COL.VESSEL]||'').trim();
    const port=(row[COL.PORT]||'').trim();
    const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
    const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();
    const pagFirm=(row[COL.PAGARE_FIRMADO]||'').trim().toUpperCase();
    const invoiceStr=inv1&&inv2?`${inv1} / ${inv2}`:inv1||inv2||'—';
    const cardTitle=`${booking} · ${invoiceStr} · ${customer}`;
    const recInfo=getReclamoInfoFromLog(bl,'solicitar liberacion');
    const telexVal=telex.toLowerCase();
    const esSolicitado=telexVal.includes('solicitado');
    const esRecibir=telexVal.includes('recibir');
    const level=telexOk?'info':d<=3?'critical':'warning';

    const telexHtml=telexOk
      ?`<div class="status-label ok">✓ Liberado</div>`
      :telexPending
        ?`<div class="status-label info">● Estado: ${telex}</div>`
        :`<div class="status-label danger">○ Sin liberación solicitada</div>`;
    const pagHtml=`<div class="status-label ${pagFirm==='SI'?'ok':'warn'}">${pagFirm==='SI'?'✓ Pagaré firmado':'○ Pagaré pendiente de firma'}</div>`;
    const recHtml=recInfo?`<div class="alert-reclamo">⚠ Solicitado ${recInfo.count} vez${recInfo.count>1?'es':''} · último ${recInfo.timeStr}</div>`:'';

    let actionBtn='';
    if(telexOk){
      actionBtn='<span class="status-label ok" style="font-size:11px;font-weight:600;">✓ Liberación completada</span>';
    } else if(esRecibir){
      actionBtn=`<button class="action-btn success-action" onclick="marcarLiberado(${origIdx})">✓ Confirmar liberación recibida</button>`;
    } else if(esSolicitado){
      actionBtn=`<button class="action-btn info-action" onclick="marcarPedroOk(${origIdx})">✓ Pedro dio el OK</button>`;
    } else {
      actionBtn=`<button class="action-btn write" onclick="solicitarLiberacionViaAppScript(${origIdx})">Solicitar liberación</button>`;
    }

    html+=`<div class="alert-item ${level}" id="lib-card-${localIdx}" style="cursor:pointer" onclick="toggleLibSelection(${localIdx})">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;">
        <input type="checkbox" class="lib-checkbox" id="lib-cb-${localIdx}" onclick="event.stopPropagation();toggleLibSelection(${localIdx})">
        <div class="alert-dot ${level}"></div>
      </div>
      <div class="alert-body">
        <div class="alert-title">${cardTitle}</div>
        <div class="alert-meta">BL: ${bl}  ·  ETA: ${fmtDate(row[COL.ETA])}</div>
        <div class="alert-tags">
          <span class="tag customer">${customer}</span>
          <span class="tag vessel">${vessel}</span>
          <span class="tag port">${port}</span>
          <span class="tag naviera">${shipping}</span>
          <span class="tag days-${dc}">${d===0?'HOY':d+'d'}</span>
        </div>
        <div class="alert-logistics">
          <div class="log-item"><span class="log-label">Containers:</span><span class="log-value">${containers||'—'}</span></div>
          <div class="log-item"><span class="log-label">Booking:</span><span class="log-value">${booking||'—'}</span></div>
          <div class="log-item"><span class="log-label">BL:</span><span class="log-value">${bl||'—'}</span></div>
          <div class="log-item"><span class="log-label">Naviera:</span><span class="log-value">${shipping||'—'}</span></div>
        </div>
        ${pagHtml}${telexHtml}${recHtml}
        <div class="alert-actions" onclick="event.stopPropagation()">${actionBtn}</div>
      </div>
      <div class="alert-right">
        <div class="days-badge ${dc}" style="font-size:28px">${d}</div>
        <div class="days-label" style="font-weight:600">DÍAS ETA</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}

async function renderLog(){
  if(!accessToken){
    document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div style="margin-bottom:16px;">Conectate con Google para ver el log de acciones.</div><button class="btn primary" onclick="handleAuth()">Conectar con Google</button></div>`;
    return;
  }
  document.getElementById('content').innerHTML=`<div class="spinner"><div class="spin"></div> Cargando log...</div>`;
  try{
    const hubId=cfg.hubSheetId||cfg.sheetId;
    const range=encodeURIComponent(`LOG!A:I`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${hubId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    const data=await r.json();
    const rows=(data.values||[]).slice(1).reverse(); // Más recientes primero
    if(!rows.length){document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">📋</div>Sin acciones registradas todavía.</div>`;return;}
    let html=`<div class="table-wrap"><div class="table-top"><span style="font-size:13px;font-weight:700;">${rows.length} acciones registradas</span></div><div style="overflow-x:auto;"><table>
      <thead><tr><th>Fecha</th><th>Hora</th><th>Fuente</th><th>FC</th><th>FC Servicios</th><th>BL</th><th>Customer</th><th>Acción</th><th>Detalle</th></tr></thead><tbody>`;
    rows.forEach(row=>{
      const accion=(row[7]||'').trim();
      const color=accion.includes('reclamo')||accion.includes('cobro')?'var(--warn)':accion.includes('liberac')?'var(--info)':'var(--muted2)';
      html+=`<tr>
        <td class="mono">${row[0]||'—'}</td>
        <td class="mono">${row[1]||'—'}</td>
        <td><span style="color:var(--accent);font-size:10px;font-family:var(--mono)">${row[2]||'AXT'}</span></td>
        <td class="mono">${row[3]||'—'}</td>
        <td class="mono">${row[4]||'—'}</td>
        <td class="mono">${(row[5]||'—').substring(0,20)}</td>
        <td>${row[6]||'—'}</td>
        <td><span style="color:${color};font-size:11px;font-weight:600">${accion||'—'}</span></td>
        <td style="color:var(--muted2);font-size:11px">${row[8]||'—'}</td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
    document.getElementById('content').innerHTML=html;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠</div>Error al cargar el log.</div>`;}
}

      en:{subject:`Payment inquiry - ${d.inv1&&d.inv2?d.inv1+' / '+d.inv2:d.inv1||d.inv2||d.bl}`,body:`Dear,\n\nWe wish to follow up on the outstanding payment for:\n\nCustomer: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nPayment due date: ${d.paymentDueFmt}${invLine}\n\nPlease confirm status of payment.\n\n${bye}`},
      es:{subject:`Consulta de pago - ${d.inv1&&d.inv2?d.inv1+' / '+d.inv2:d.inv1||d.inv2||d.bl}`,body:`Estimado/a,\n\nNos comunicamos para hacer seguimiento del pago pendiente de:\n\nCliente: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nFecha de pago estimada: ${d.paymentDueFmt}${invLine}\n\nAgradecemos confirmar estado del pago.\n\n${bye}`}
    },
    solicitar_liberacion:{
      en:{subject:`Release request - ${d.exporter||d.customer} - AXT - ETA ${d.etaFmt}`,body:`Dear,\n\nWe kindly request the release of the following shipment:\n\nExporter: ${d.exporter||d.customer}\nCustomer: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nVessel: ${d.vessel}\nPort: ${d.port}\nETA: ${d.etaFmt}\n\n@Pedro Berro Madero Please confirm to proceed with the release.\n\nBest regards,\nLATINUT S.A.`},
      es:{subject:`Solicitud de liberacion - ${d.exporter||d.customer} - AXT - ETA ${d.etaFmt}`,body:`Estimado/a,\n\nSolicitamos la liberacion del siguiente embarque:\n\nExporter: ${d.exporter||d.customer}\nCliente: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nBuque: ${d.vessel}\nPuerto: ${d.port}\nETA: ${d.etaFmt}\n\n@Pedro Berro Madero Por favor, dar el ok para proceder con la liberacion.\n\nQuedamos a la espera de confirmacion.\n\nSaludos,\nLATINUT S.A.`}
    }
  };
  return tpls[mailType]?.[lang]||tpls[mailType]?.en||{subject:'',body:''};
}

function openBulkMailModal(rowIndices, mailType){
  if(!rowIndices.length) return;
  const rows=rowIndices.map(i=>allRows[i]);
  
  // Get exporter from first row (col S=18)
  const exporter=(rows[0][COL.EXPORTER]||'').trim();
  // Get earliest ETA
  const etas=rows.map(r=>r[COL.ETA]).filter(Boolean).sort();
  const etaStr=etas.length?fmtDate(etas[0]):'—';

  // Build each shipment block
  const lines=rows.map(row=>{
    const bl=(row[COL.BL]||'').trim();
    const booking=(row[COL.BOOKING]||'').trim();
    const containers=(row[COL.CONTAINERS]||'').trim();
    const vessel=(row[COL.VESSEL]||'').trim();
    const port=(row[COL.PORT]||'').trim();
    const eta=fmtDate(row[COL.ETA]);
    const exp=(row[COL.EXPORTER]||exporter).trim();
    return `Exporter: ${exp}\nBL: ${bl}\nBooking: ${booking}\nContainer(s): ${containers}\nBuque: ${vessel}\nPuerto: ${port}\nETA: ${eta}`;
  }).join('\n\n');

  const subject=`Solicitud de liberaciones - ${exporter} - AXT - ETA ${etaStr}`;
  const body=`Estimado/a,\n\nSolicitamos la liberacion de los siguientes embarques:\n\n${lines}\n\n@Pedro Berro Madero Por favor, dar el ok para proceder con la liberacion.\n\nQuedamos a la espera de confirmacion.\n\nSaludos,\nLATINUT S.A.`;

  const transcargo=getContactsForEmpresa('Transcargo');
  const ccSiempreAll=contacts.filter(c=>c.ccSiempre).map(c=>c.email);
  const libCC=ccSiempreAll.length?ccSiempreAll.join(', '):'pberro@axtsolutions.com';

  modalData={rowIndices, mailType, isBulk:true, exporter, rows};
  document.getElementById('lang-en').classList.remove('active');
  document.getElementById('lang-es').classList.add('active');
  document.getElementById('modal-title').textContent=`Liberación masiva — ${rows.length} cargas`;
  document.getElementById('modal-to').textContent=transcargo.to||'Thomas Laurenti <tlaurenti@transcargoarg.com>';
  document.getElementById('modal-cc').textContent=libCC;
  document.getElementById('modal-subject').textContent=subject;
  document.getElementById('modal-body').value=body;
  const btn=document.getElementById('send-draft-btn');
  btn.textContent=`📋 Solicitar ${rows.length} liberaciones + Draft`;
  document.getElementById('mail-modal').classList.remove('hidden');
}


function openMailModal(rowIdx, mailType){
  const row=allRows[rowIdx];
  if(!row) return;
  const d={
    negocio:(row[COL.NEGOCIO]||'').trim(),
    bl:(row[COL.BL]||'').trim(),
    booking:(row[COL.BOOKING]||'').trim(),
    containers:(row[COL.CONTAINERS]||'').trim(),
    shipping:(row[COL.SHIPPING]||'').trim(),
    customer:(row[COL.CUSTOMER]||'').trim(),
    exporter:(row[COL.EXPORTER]||'').trim(),
    vessel:(row[COL.VESSEL]||'').trim(),
    port:(row[COL.PORT]||'').trim(),
    etaFmt:fmtDate(row[COL.ETA]),
    paymentDueFmt:fmtDate(row[COL.FECHA_EST_COBRO]),
    invoiceInfo:getInvoiceInfo(row),
    docsNote:(row[COL.DOCUMENTOS]||'').trim(),
    inv1:(row[COL.INVOICE_CLIENTE]||'').trim(),
    inv2:(row[COL.INVOICE_FC_SERV]||'').trim()
  };
  currentLang=mailType==='solicitar_liberacion'?'es':'en';
  modalData={rowIdx,mailType,d};
  document.getElementById('lang-en').classList.toggle('active',currentLang==='en');
  document.getElementById('lang-es').classList.toggle('active',currentLang==='es');
  document.getElementById('modal-title').textContent='Borrador — '+mailType.replace(/_/g,' ');
  let toStr, ccStr;
  if(mailType==='solicitar_liberacion'){
    const transcargo=getContactsForEmpresa('Transcargo');
    toStr=transcargo.to||'Thomas Laurenti <tlaurenti@transcargoarg.com>';
    const ccSiempre=contacts.filter(c=>c.ccSiempre).map(c=>c.email);
    ccStr=ccSiempre.length?ccSiempre.join(', '):'pberro@axtsolutions.com';
  } else {
    const contactInfo=getContactsForEmpresa(d.customer);
    toStr=contactInfo.to||`${d.customer} <sin contacto cargado>`;
    ccStr=contactInfo.cc||'pedro@axt.com';
  }
  document.getElementById('modal-to').textContent=toStr;
  document.getElementById('modal-cc').textContent=ccStr;
  const tpl=buildMailBody(mailType,d,'en');
  document.getElementById('modal-subject').textContent=tpl.subject;
  document.getElementById('modal-body').value=tpl.body;

  // Si es liberación, cambiar botón
  const btn=document.getElementById('send-draft-btn');
  if(mailType==='solicitar_liberacion'){
    btn.textContent='📋 Marcar como solicitado + Draft';
  } else {
    btn.textContent='✉ Crear borrador en Gmail';
  }
  document.getElementById('mail-modal').classList.remove('hidden');
}

function setLang(lang){
  currentLang=lang;
  document.getElementById('lang-en').classList.toggle('active',lang==='en');
  document.getElementById('lang-es').classList.toggle('active',lang==='es');
  // Skip rebuild for bulk mails - body is already correct Spanish
  if(modalData.isBulk) return;
  const tpl=buildMailBody(modalData.mailType,modalData.d,lang);
  document.getElementById('modal-subject').textContent=tpl.subject;
  document.getElementById('modal-body').value=tpl.body;
}

function closeModal(){document.getElementById('mail-modal').classList.add('hidden');}

async function sendDraft(){
  const subject=document.getElementById('modal-subject').textContent;
  const body=document.getElementById('modal-body').value;
  const to=document.getElementById('modal-to').textContent;
  const cc=document.getElementById('modal-cc').textContent;
  const {mailType,d,rowIdx,isBulk,rowIndices,rows:bulkRows}=modalData;

  // Crear draft en Gmail
  await createGmailDraft(to, cc, subject, body);

  if(isBulk && rowIndices){
    // Bulk liberation
    for(let i=0;i<rowIndices.length;i++){
      const ri=rowIndices[i];
      const row=allRows[ri];
      const bl=(row[COL.BL]||'').trim();
      const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
      const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();
      saveReclamo(bl, mailType);
      const writeOk=await writeCell(ri, COL.TELEX, 'solicitado, falta ok');
      console.log('writeCell row',ri,'col',COL.TELEX,'result:',writeOk);
      await appendLog({
        fuente:'AXT',
        fc: inv1||'',
        fcServ: inv2||'',
        bl,
        customer:(row[COL.CUSTOMER]||'').trim(),
        accion:'solicitar liberacion (bulk)',
        detalle: subject
      });
    }
    showToast(`✓ ${rowIndices.length} TELEX actualizados en planilla`);
  } else if(d){
    // Single
    saveReclamo(d.bl, mailType);
    if(mailType==='solicitar_liberacion'){
      const ok=await writeCell(rowIdx, COL.TELEX, 'solicitado, falta ok');
      if(ok) showToast('✓ TELEX actualizado en planilla');
    }
    await appendLog({
      fuente:'AXT',
      fc: d.inv1||d.negocio,
      fcServ: d.inv2||'',
      bl: d.bl,
      customer: d.customer,
      accion: mailType.replace(/_/g,' '),
      detalle: subject
    });
  }

  closeModal();
  await loadLog();
  setTimeout(()=>renderView(currentView), 500);
}
