<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUB LATINUT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap');
:root {
  --bg:#0d0d0d; --bg2:#141414; --bg3:#1c1c1c; --bg4:#222;
  --border:#252525; --border2:#333;
  --text:#ebebeb; --muted:#666; --muted2:#999;
  --accent:#c8f050; --accent-dim:#8aac2a;
  --danger:#ff4f4f; --warn:#ffaa22; --ok:#3dd68c; --info:#4d9fff;
  --font:'Syne',sans-serif; --mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px;line-height:1.5;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;}
.shell{display:flex;min-height:100vh;}
.sidebar{width:220px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:10;}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.logo-text{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--accent);}
.logo-sub{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.nav{padding:16px 0;flex:1;}
.nav-section{padding:0 12px;margin-bottom:4px;}
.nav-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;color:var(--muted2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:var(--accent);color:#0d0d0d;}
.nav-item .icon{width:16px;text-align:center;font-size:13px;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:10px;}
.nav-badge.warn{background:var(--warn);}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);}
.sheet-status{font-size:11px;color:var(--muted);font-family:var(--mono);}
.sheet-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ok);margin-right:6px;}
.sheet-dot.err{background:var(--danger);}
.sheet-dot.loading{background:var(--warn);}
.auth-status{margin-top:8px;font-size:11px;font-family:var(--mono);}
.auth-btn{margin-top:8px;width:100%;padding:6px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;transition:all .15s;}
.auth-btn:hover{background:var(--bg4);}
.auth-btn.connected{border-color:var(--ok);color:var(--ok);}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:5;}
.topbar-title{font-size:20px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--border2);background:var(--bg3);color:var(--text);}
.btn:hover{background:var(--bg4);}
.btn.primary{background:var(--accent);color:#0d0d0d;border-color:var(--accent);}
.btn.primary:hover{background:var(--accent-dim);}
.last-sync{font-size:11px;color:var(--muted);font-family:var(--mono);}
.content{padding:24px 28px;flex:1;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;font-family:var(--mono);line-height:1;}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:4px;}
.stat-card.alert-card{border-color:var(--danger);background:rgba(255,79,79,.06);}
.stat-card.warn-card{border-color:var(--warn);background:rgba(255,170,34,.06);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted2);}
.section-count{font-family:var(--mono);font-size:11px;color:var(--muted);}
.alert-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.alert-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;transition:border-color .15s;}
.alert-item:hover{border-color:var(--border2);}
.alert-item.critical{border-left:3px solid var(--danger);}
.alert-item.warning{border-left:3px solid var(--warn);}
.alert-item.info{border-left:3px solid var(--info);}
.alert-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.alert-dot.critical{background:var(--danger);}
.alert-dot.warning{background:var(--warn);}
.alert-dot.info{background:var(--info);}
.alert-body{flex:1;min-width:0;}
.alert-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.alert-meta{font-size:11px;color:var(--muted2);font-family:var(--mono);margin-bottom:8px;}
.alert-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px;font-weight:500;}
.tag.customer{background:rgba(77,159,255,.12);color:var(--info);}
.tag.vessel{background:rgba(61,214,140,.1);color:var(--ok);}
.tag.port{background:rgba(200,240,80,.1);color:var(--accent);}
.tag.naviera{background:rgba(180,120,255,.12);color:#c084fc;}
.tag.days-red{background:rgba(255,79,79,.12);color:var(--danger);}
.tag.days-warn{background:rgba(255,170,34,.12);color:var(--warn);}
.tag.days-ok{background:rgba(61,214,140,.1);color:var(--ok);}
.alert-logistics{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 16px;margin-bottom:10px;background:var(--bg3);border-radius:6px;padding:8px 10px;}
.log-item{font-size:10px;font-family:var(--mono);}
.log-label{color:var(--muted);margin-right:4px;}
.log-value{color:var(--text);}
.lib-checkbox{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:4px;}
.lib-bulk-bar{display:none;position:sticky;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0d0d0d;padding:10px 24px;border-radius:30px;font-weight:700;font-size:13px;cursor:pointer;z-index:20;box-shadow:0 4px 20px rgba(0,0,0,.5);border:none;font-family:var(--font);}
.lib-bulk-bar.visible{display:block;}
.alert-reclamo{font-size:10px;font-family:var(--mono);color:var(--warn);margin-bottom:8px;padding:4px 8px;background:rgba(255,170,34,.08);border-radius:4px;border-left:2px solid var(--warn);}
.alert-actions{display:flex;gap:8px;flex-wrap:wrap;}
.action-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:5px;cursor:pointer;transition:all .15s;font-family:var(--font);border:1px solid;}
.action-btn.mail{background:rgba(200,240,80,.1);color:var(--accent);border-color:rgba(200,240,80,.3);}
.action-btn.mail:hover{background:rgba(200,240,80,.2);}
.action-btn.write{background:rgba(77,159,255,.1);color:var(--info);border-color:rgba(77,159,255,.3);}
.action-btn.write:hover{background:rgba(77,159,255,.2);}
.alert-right{text-align:right;flex-shrink:0;}
.days-badge{font-size:22px;font-weight:800;font-family:var(--mono);line-height:1;}
.days-badge.red{color:#ff6b35;}
.days-badge.warn{color:var(--warn);}
.days-badge.ok{color:var(--ok);}
.days-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-weight:700;}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:28px;}
.table-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
thead th{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.02);}
td{padding:11px 14px;font-size:12px;vertical-align:middle;}
td.mono{font-family:var(--mono);font-size:11px;}
.doc-status{display:inline-flex;align-items:center;gap:5px;}
.doc-dot{width:6px;height:6px;border-radius:50%;}
.doc-dot.red{background:var(--danger);}
.doc-dot.green{background:var(--ok);}
.doc-text{color:var(--muted2);font-size:10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);}
.pagare-status{font-size:10px;font-family:var(--mono);}
.pagare-status.enviado{color:var(--ok);}
.pagare-status.pendiente{color:var(--warn);}
.row-action{font-size:10px;color:var(--muted);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:4px;font-family:var(--font);font-weight:600;transition:all .15s;}
.row-action:hover{border-color:var(--accent);color:var(--accent);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.hidden{display:none;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:580px;max-width:95vw;overflow:hidden;}
.modal-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:700;}
.modal-header-right{display:flex;align-items:center;gap:12px;}
.modal-close{font-size:20px;color:var(--muted);cursor:pointer;line-height:1;}
.lang-toggle{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden;}
.lang-btn{padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg3);color:var(--muted2);border:none;font-family:var(--font);transition:all .15s;}
.lang-btn.active{background:var(--accent);color:#0d0d0d;}
.modal-body{padding:20px 24px;}
.mail-field{margin-bottom:14px;}
.mail-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);margin-bottom:6px;font-weight:600;}
.mail-value{font-size:12px;font-family:var(--mono);color:var(--text);background:var(--bg3);padding:8px 12px;border-radius:6px;border:1px solid var(--border2);}
.mail-textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:10px 12px;resize:vertical;min-height:150px;line-height:1.6;}
.mail-textarea:focus{outline:none;border-color:var(--accent);}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.config-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.config-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.config-desc{font-size:12px;color:var(--muted2);margin-bottom:16px;}
.config-field{margin-bottom:12px;}
.config-label{font-size:11px;color:var(--muted2);margin-bottom:4px;font-weight:600;}
.config-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;}
.config-input:focus{outline:none;border-color:var(--accent);}
.config-save{display:flex;justify-content:flex-end;margin-top:8px;}
.spinner{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:13px;gap:10px;}
.spin{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{padding:48px;text-align:center;color:var(--muted);font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:12px;}
.log-table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:28px;}
@media(max-width:768px){
  .content{padding:16px;}
  .topbar{padding:12px 16px;}
  .modal{width:95vw;}
  .modal-body{padding:14px 16px;}
  .modal-footer{padding:12px 16px;}
  .stats-row{gap:8px;}
  .stat-card{padding:12px 14px;}
  .stat-value{font-size:22px;}
  .sidebar{transform:translateX(-220px);transition:transform .25s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .mobile-toggle{display:flex;}
  .alert-logistics{grid-template-columns:1fr;}
}
.mobile-toggle{display:none;align-items:center;justify-content:center;width:36px;height:36px;border-radius:6px;background:var(--bg3);border:1px solid var(--border2);cursor:pointer;font-size:16px;}
.overlay-close{display:none;position:fixed;inset:0;z-index:9;background:rgba(0,0,0,.5);}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-text">LATINUT</div>
    <div class="logo-sub">Hub de Control</div>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <div class="nav-label">Operaciones</div>
      <div class="nav-item active" onclick="showView('alertas')">
        <span class="icon">⚡</span> Alertas
        <span class="nav-badge" id="badge-alertas"></span>
      </div>
      <div class="nav-item" onclick="showView('cargas')">
        <span class="icon">📦</span> Cargas AXT
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Finanzas</div>
      <div class="nav-item" onclick="showView('cobranza')">
        <span class="icon">💰</span> Cobranza
        <span class="nav-badge warn" id="badge-cobranza"></span>
      </div>
      <div class="nav-item" onclick="showView('liberaciones')">
        <span class="icon">🔓</span> Liberaciones
        <span class="nav-badge warn" id="badge-liberaciones"></span>
      </div>
      <div class="nav-item" onclick="showView('pagares')">
        <span class="icon">📄</span> Pagarés
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Historial</div>
      <div class="nav-item" onclick="showView('log')">
        <span class="icon">📋</span> Log de acciones
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Sistema</div>
      <div class="nav-item" onclick="showView('config')">
        <span class="icon">⚙</span> Configuración
      </div>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="sheet-status">
      <span class="sheet-dot" id="sheet-dot"></span>
      <span id="sheet-status-text">Cargando...</span>
    </div>
    <div class="auth-status" id="auth-status">
      <span id="auth-status-text" style="color:var(--muted)">● Sin autenticar</span>
    </div>
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Conectar con Google</button>
  </div>
</aside>
<div class="overlay-close" id="overlay-close" onclick="closeSidebar()"></div>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="mobile-toggle" onclick="toggleSidebar()">☰</span>
      <span class="topbar-title" id="view-title">Alertas</span>
    </div>
    <div class="topbar-right">
      <span class="last-sync" id="last-sync">—</span>
      <button class="btn primary" onclick="loadData()">↻ Sincronizar</button>

    <div class="spinner"><div class="spin"></div> Cargando datos...</div>
  </div>

</div>

<!-- MODAL MAIL -->
<div class="modal-overlay hidden" id="mail-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Crear borrador</span>
      <div class="modal-header-right">
        <div class="lang-toggle">
          <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>

      <div class="mail-field"><div class="mail-label">Asunto</div><div class="mail-value" id="modal-subject">—</div></div>

      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="send-draft-btn" onclick="sendDraft()">✉ Crear borrador en Gmail</button>
    </div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const CFG_KEY = 'hub_latinut_config';
let cfg = {...{sheetId:'',sheetName:'Cargas',apiKey:'',clientId:'',alerta_dias:10,hubSheetId:'11r3m9KuXWFRrSjdHf1an2xQDjNwnXhadWk5WbShuLms'},...JSON.parse(localStorage.getItem(CFG_KEY)||'{}')};

// ─── OAUTH ───────────────────────────────────────────────────────────────────
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/gmail.compose';
let tokenClient = null;
let accessToken = null;
let allRows = [], currentView = 'alertas', modalData = {}, currentLang = 'en';
let contacts = []; // Cache de contactos del HUB sheet
let logRows = []; // Cache del LOG del HUB sheet

// ─── CONTACTS ────────────────────────────────────────────────────────────────
async function loadContacts(){
  if(!cfg.hubSheetId||!cfg.apiKey) return;
  try{
    const range=encodeURIComponent('CONTACTOS!A2:E');
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.hubSheetId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    if(!r.ok) return;
    const data=await r.json();
    contacts=(data.values||[]).map(row=>({
      empresa:(row[0]||'').trim(),
      contacto:(row[1]||'').trim(),
      email:(row[2]||'').trim(),
      rol:(row[3]||'').trim(),
      ccSiempre:(row[4]||'').trim().toUpperCase()==='SI'
    })).filter(c=>c.email);
    console.log(`Loaded ${contacts.length} contacts`);
  }catch(e){console.error('Error loading contacts',e);}
}

function getContactsForEmpresa(empresa){
  if(!empresa||!contacts.length) return {to:'', cc:'pedro@axt.com'};
  const emp=empresa.trim().toUpperCase();
  const match=contacts.filter(c=>c.empresa.toUpperCase()===emp);
  const principal=match.filter(c=>c.rol.toLowerCase().includes('principal'));
  const cc=contacts.filter(c=>c.ccSiempre).map(c=>c.email);
  // To: principal o primero que matchea
  const toContact=principal[0]||match[0];
  const toStr=toContact?`${toContact.contacto} <${toContact.email}>`:'';
  // CC: los que tienen CC_Siempre + otros contactos no principales
  const otherEmails=match.filter(c=>c!==toContact&&!c.ccSiempre).map(c=>c.email);
  const allCC=[...new Set([...cc,...otherEmails])];
  return{to:toStr, cc:allCC.join(', ')||'pedro@axt.com'};
}

// ─── LOG CACHE ───────────────────────────────────────────────────────────────
async function loadLog(){
  if(!cfg.hubSheetId||!cfg.apiKey) return;
  try{
    const range=encodeURIComponent('LOG!A:I');
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.hubSheetId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    if(!r.ok) return;
    const data=await r.json();
    logRows=(data.values||[]).slice(1); // Skip header
    console.log(`Loaded ${logRows.length} log entries`);
  }catch(e){console.error('Error loading log',e);}
}

function getReclamoInfoFromLog(bl, mailType){
  if(!logRows.length) return null;
  const accion=mailType.replace(/_/g,' ');
  // col 5=BL, col 7=Accion (0-indexed: Fecha,Hora,Fuente,FC,FCServ,BL,Customer,Accion,Detalle)
  const matches=logRows.filter(r=>(r[5]||'').trim()===bl&&(r[7]||'').toLowerCase().includes(accion.toLowerCase().split(' ')[0]));
  if(!matches.length) return null;
  // Get last entry date
  const last=matches[matches.length-1];
  const lastDateStr=(last[0]||'')+' '+(last[1]||'');
  const hoursAgo=Math.round((Date.now()-new Date(last[0].split('/').reverse().join('-')+' '+last[1]).getTime())/3600000);
  const timeStr=isNaN(hoursAgo)?'recientemente':hoursAgo<24?`hace ${hoursAgo}h`:`hace ${Math.round(hoursAgo/24)}d`;
  return{count:matches.length, timeStr};
}

// ─── COLUMNAS ────────────────────────────────────────────────────────────────
// A=0 Negocio, B=1 Tns, C=2 Product, D=3 Packing, E=4 Lots
// F=5 Containers, G=6 Booking, H=7 BL, I=8 Shipping Line, J=9 Vessel
// K=10 Consolidación, L=11 ETD, M=12 ETA, N=13 Port
// O=14 DOCUMENTOS, P=15 ENVIO A LOMBARD, Q=16 ENVIO AL CLIENTE, R=17 TELEX
// S=18 Exporter, T=19 Invoice FC Planta, U=20 Contract, V=21 Price FCA, W=22 Total
// X=23 Customer, Y=24 Invoice FC Lombard, Z=25 Contract, AA=26 Price
// AB=27 Flete, AC=28 Total CFR, AD=29 INCOTERM
// AE=30 Invoice FC Servicios, AF=31 Price FC Servicios
// AT=45 Pagaré Enviado, AU=46 Pagaré Firmado
// AV=47 Fecha estimada cobro, AW=48 Fecha de cobro real
const COL = {
  NEGOCIO:0, TNS:1, PRODUCT:2, PACKING:3, LOTS:4,
  CONTAINERS:5, BOOKING:6, BL:7, SHIPPING:8, VESSEL:9,
  CONSOLIDACION:10, ETD:11, ETA:12, PORT:13,
  DOCUMENTOS:14, LOMBARD:15, CLIENTE_ENV:16, TELEX:17, EXPORTER:18,
  CUSTOMER:23, INVOICE_CLIENTE:24, TOTAL_CFR:28, INCOTERM:29,
  INVOICE_FC_SERV:30,
  PAGARE_ENVIADO:45, PAGARE_FIRMADO:46,
  FECHA_EST_COBRO:47, FECHA_COBRO:48
};

// ─── UTILS ───────────────────────────────────────────────────────────────────
function parseDate(v){
  if(!v) return null;
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(v)){const[dd,mm,yy]=v.split('/');const d=new Date(+yy,+mm-1,+dd);return isNaN(d)?null:d;}
  if(/^\d{4}-\d{2}-\d{2}/.test(v)){const d=new Date(v);return isNaN(d)?null:d;}
  const d=new Date(v);return isNaN(d)?null:d;
}
function daysFrom(v){const d=parseDate(v);if(!d)return null;return Math.round((d-new Date())/86400000);}
function fmtDate(v){const d=parseDate(v);if(!d)return v||'—';return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});}
function isClosed(row){return(row[COL.FECHA_EST_COBRO]||'').trim().toUpperCase()==='SI'&&(row[COL.FECHA_COBRO]||'').trim()!=='';}
function daysClass(n){if(n===null)return '';if(n<=7)return 'red';if(n<=14)return 'warn';return 'ok';}
function nowStr(){const n=new Date();return{fecha:n.toLocaleDateString('es-AR'),hora:n.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})};}

function getInvoiceInfo(row){
  const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
  const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();
  const customer=(row[COL.CUSTOMER]||'—').trim();
  if(inv1&&inv2) return `Invoice (${customer}): ${inv1}\nFC Servicios (${customer}): ${inv2}`;
  if(inv1) return `Invoice (${customer}): ${inv1}`;
  if(inv2) return `FC Servicios (${customer}): ${inv2}`;
  return '';
}

// ─── GOOGLE AUTH ─────────────────────────────────────────────────────────────
function initGoogleAuth(){
  if(!cfg.clientId) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: cfg.clientId,
    scope: SCOPES,
    callback: (resp) => {
      if(resp.error) { console.error(resp); return; }
      accessToken = resp.access_token;
      updateAuthUI(true);
      loadData();
    }
  });
}

function handleAuth(){
  if(accessToken){
    // Desconectar
    google.accounts.oauth2.revoke(accessToken, ()=>{
      accessToken=null;
      updateAuthUI(false);
    });
  } else {
    if(!cfg.clientId){ alert('Primero configurá el Client ID en Configuración.'); return; }
    tokenClient.requestAccessToken();
  }
}

function updateAuthUI(connected){
  const txt=document.getElementById('auth-status-text');
  const btn=document.getElementById('auth-btn');
  if(connected){
    txt.textContent='● Conectado con Google';
    txt.style.color='var(--ok)';
    btn.textContent='Desconectar';
    btn.className='auth-btn connected';
  } else {
    txt.textContent='● Sin autenticar';
    txt.style.color='var(--muted)';
    btn.textContent='Conectar con Google';
    btn.className='auth-btn';
  }
}

// ─── DATA ────────────────────────────────────────────────────────────────────
async function loadData(){
  if(!cfg.sheetId||!cfg.apiKey){showConfigPrompt();return;}
  setSheetStatus('loading','Sincronizando...');
  try{
    const range=encodeURIComponent(`${cfg.sheetName}!A4:BI`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    const rawRows=(data.values||[]);
    allRows=rawRows.map((row,i)=>{row._sheetRow=i+4;return row;}).filter(row=>row[COL.NEGOCIO]&&!isClosed(row));
    await loadContacts();
    await loadLog();
    setSheetStatus('ok',`${allRows.length} cargas activas`);
    document.getElementById('last-sync').textContent='Sync '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    updateBadges();renderView(currentView);
  }catch(e){setSheetStatus('err','Error de conexión');console.error(e);}
}

function setSheetStatus(state,text){
  const dot=document.getElementById('sheet-dot');
  dot.className='sheet-dot'+(state==='err'?' err':state==='loading'?' loading':'');
  document.getElementById('sheet-status-text').textContent=text;
}

// ─── WRITE TO SHEET ───────────────────────────────────────────────────────────
async function writeCell(row, col, value){
  if(!accessToken){alert('Conectate con Google primero para escribir en la planilla.');return false;}
  // row es 0-based en allRows, datos empiezan en fila 4 del sheet (filas 1-3 son headers)
  // allRows filtra por isClosed, entonces necesitamos encontrar la fila real
  // La API devuelve datos desde A4, entonces allRows[0] = fila 4, allRows[1] = fila 5, etc.
  // Use stored _sheetRow if available (accounts for filtered rows)
  const sheetRow = allRows[row]&&allRows[row]._sheetRow ? allRows[row]._sheetRow : row + 4;
  const colLetter = String.fromCharCode(65 + col);
  const range = encodeURIComponent(`${cfg.sheetName}!${colLetter}${sheetRow}`);
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.sheetId}/values/${range}?valueInputOption=USER_ENTERED`;
  const r = await fetch(url, {
    method: 'PUT',
    headers: {'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
    body: JSON.stringify({values:[[value]]})
  });
  return r.ok;
}

async function appendLog(data){
  if(!accessToken) return;
  const {fecha,hora}=nowStr();
  const hubId=cfg.hubSheetId||cfg.sheetId;
  const values=[[fecha, hora, data.fuente||'AXT', data.fc||'', data.fcServ||'', data.bl||'', data.customer||'', data.accion||'', data.detalle||'']];
  const range=encodeURIComponent(`LOG!A:I`);
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${hubId}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  await fetch(url,{
    method:'POST',
    headers:{'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
    body:JSON.stringify({values})
  });
}

// ─── GMAIL DRAFT ─────────────────────────────────────────────────────────────
async function createGmailDraft(to, cc, subject, body){
  if(!accessToken){
    // Fallback: copiar al portapapeles
    try{await navigator.clipboard.writeText(`Para: ${to}\nCC: ${cc}\nAsunto: ${subject}\n\n${body}`);}catch(e){}
    alert('✓ Contenido copiado al portapapeles.\n\nConectate con Google para crear drafts reales en Gmail.');
    return false;
  }
  const email = [`To: ${to}`, `Cc: ${cc}`, `Subject: ${subject}`, `Content-Type: text/plain; charset=utf-8`, ``, body].join('\r\n');
  const encoded = btoa(unescape(encodeURIComponent(email))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const r = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/drafts', {
    method: 'POST',
    headers: {'Authorization':`Bearer ${accessToken}`,'Content-Type':'application/json'},
    body: JSON.stringify({message:{raw:encoded}})
  });
  if(r.ok){
    showToast('✓ Borrador creado en Gmail');
    return true;
  }
  return false;
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--ok);color:#0d0d0d;padding:10px 18px;border-radius:8px;font-weight:700;font-size:12px;z-index:999;transition:opacity .3s;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',3000);
}

// ─── ALERTS ──────────────────────────────────────────────────────────────────
function getAlerts(){
  const alerts=[];
  allRows.forEach((row,idx)=>{
    const eta=parseDate(row[COL.ETA]);
    const dETA=eta?Math.round((eta-new Date())/86400000):null;
    const customer=(row[COL.CUSTOMER]||'—').trim();
    const vessel=(row[COL.VESSEL]||'—').trim();
    const port=(row[COL.PORT]||'—').trim();
    const bl=(row[COL.BL]||'—').trim();
    const booking=(row[COL.BOOKING]||'—').trim();
    const containers=(row[COL.CONTAINERS]||'—').trim();
    const shipping=(row[COL.SHIPPING]||'—').trim();
    const negocio=(row[COL.NEGOCIO]||'—').trim();
    const product=(row[COL.PRODUCT]||'—').trim();
    const invoiceInfo=getInvoiceInfo(row);
    const paymentDueFmt=fmtDate(row[COL.FECHA_EST_COBRO]);
    const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
    const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();

    const detail={negocio,product,bl,booking,containers,shipping,vessel,port,
      etaFmt:fmtDate(row[COL.ETA]),customer,paymentDueFmt,invoiceInfo,
      docsNote:(row[COL.DOCUMENTOS]||'').trim(),inv1,inv2};
    const logistics={containers,booking,bl,shipping};

    // ETA próximo
    if(dETA!==null&&dETA<=cfg.alerta_dias){
      const level=dETA<=7?'critical':'warning';
      const etaLabel=dETA<0?`Llegó hace ${Math.abs(dETA)}d`:dETA===0?'Llega HOY':`Llega en ${dETA}d`;
      const telexStatus=(row[COL.TELEX]||'').trim();
      const recInfo=getReclamoInfoFromLog(bl,'reclamo_pago');
      alerts.push({level,dETA,rowIdx:idx,
        title:`Arribo próximo — ${customer}`,
        meta:`${negocio}  ·  ETA: ${fmtDate(row[COL.ETA])}`,
        tags:[{label:customer,cls:'customer'},{label:vessel,cls:'vessel'},{label:port,cls:'port'},{label:shipping,cls:'naviera'},{label:etaLabel,cls:'days-'+daysClass(dETA)}],
        logistics,detail,recInfo,
        telexStatus,
        actions:[
          {label:'✉ Reclamo de pago',mailType:'reclamo_pago'},
          {label:'✉ Envío docs',mailType:'envio_docs'},
          {label:'✉ Shipment Advice',mailType:'shipment_advice'},
          {label:'📋 Solicitar liberación',mailType:'solicitar_liberacion',isWrite:true}
        ]
      });
    }

    // Docs pendientes
    const docs=(row[COL.DOCUMENTOS]||'').trim();
    if(docs&&docs.toUpperCase()!=='SI'&&dETA!==null&&dETA<=20){
      alerts.push({level:'warning',rowIdx:idx,
        title:`Docs pendientes — ${customer}`,
        meta:`${negocio}  ·  BL: ${bl}  ·  ETA: ${fmtDate(row[COL.ETA])}`,
        tags:[{label:customer,cls:'customer'},{label:product,cls:'vessel'}],
        logistics,docsText:docs,detail,
        actions:[{label:'✉ Solicitar docs',mailType:'solicitar_docs'}]
      });
    }

    // Pagaré pendiente
    const pagEnv=(row[COL.PAGARE_ENVIADO]||'').trim().toUpperCase();
    if(pagEnv!=='SI'&&dETA!==null&&dETA<=30){
      const recInfo=getReclamoInfoFromLog(bl,'solicitar_pagare');
      alerts.push({level:'info',rowIdx:idx,
        title:`Pagaré pendiente — ${customer}`,
        meta:`${negocio}  ·  BL: ${bl}  ·  ETA: ${fmtDate(row[COL.ETA])}`,
        tags:[{label:customer,cls:'customer'},{label:'Pagaré no enviado',cls:'days-warn'}],
        logistics,detail,recInfo,
        actions:[{label:'✉ Solicitar pagaré',mailType:'solicitar_pagare'}]
      });
    }

    // Cobro estimado
    const fechaEst=row[COL.FECHA_EST_COBRO];
    const dCobro=daysFrom(fechaEst);
    if(dCobro!==null&&dCobro<=14&&dCobro>=-30){
      const level2=dCobro<=0?'critical':'warning';
      const invoiceTitle=inv1&&inv2?`${inv1} / ${inv2}`:inv1||inv2||negocio;
      const cardTitle=`Cobro estimado — ${invoiceTitle} · ${customer}`;
      const invLogLine=inv1&&inv2
        ?`<div class="log-item"><span class="log-label">Invoice:</span><span class="log-value">${inv1}</span></div><div class="log-item"><span class="log-label">FC Servicios:</span><span class="log-value">${inv2}</span></div>`
        :inv1?`<div class="log-item"><span class="log-label">Invoice:</span><span class="log-value">${inv1}</span></div>`
        :inv2?`<div class="log-item"><span class="log-label">FC Servicios:</span><span class="log-value">${inv2}</span></div>`:'';
      const recInfo=getReclamoInfoFromLog(bl,'reclamo_cobro');
      alerts.push({level:level2,rowIdx:idx,
        title:cardTitle,
        meta:`Payment due: ${fmtDate(fechaEst)}  ·  BL: ${bl}`,
        tags:[{label:customer,cls:'customer'},{label:dCobro<=0?`Vencido hace ${Math.abs(dCobro)}d`:`En ${dCobro}d`,cls:'days-'+daysClass(dCobro)}],
        logistics,detail,invLogLine,recInfo,
        actions:[{label:'✉ Reclamo de cobro',mailType:'reclamo_cobro'}]
      });
    }
  });
  return alerts.sort((a,b)=>({critical:0,warning:1,info:2}[a.level]||2)-({critical:0,warning:1,info:2}[b.level]||2));
}

function updateBadges(){
  const alerts=getAlerts();
  const crit=alerts.filter(a=>a.level==='critical'||a.level==='warning').length;
  const bA=document.getElementById('badge-alertas');
  bA.textContent=crit||'';bA.style.display=crit?'':'none';
  const cobros=allRows.filter(r=>{const d=daysFrom(r[COL.FECHA_EST_COBRO]);return d!==null&&d<=14;}).length;
  const bC=document.getElementById('badge-cobranza');
  bC.textContent=cobros||'';bC.style.display=cobros?'':'none';
  const libs=allRows.filter(r=>{const d=daysFrom(r[COL.ETA]);const t=(r[COL.TELEX]||'').trim();return d!==null&&d>=0&&d<=7&&t.toUpperCase()!=='SI';}).length;
  const bL=document.getElementById('badge-liberaciones');
  if(bL){bL.textContent=libs||'';bL.style.display=libs?'':'none';}
}

function renderLiberaciones(){
  const rows=allRows.filter(r=>{
    const d=daysFrom(r[COL.ETA]);
    return d!==null&&d>=0&&d<=7;
  }).sort((a,b)=>(daysFrom(a[COL.ETA])||999)-(daysFrom(b[COL.ETA])||999));

  if(!rows.length){
    document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">🔓</div>Sin cargas con ETA en los próximos 7 días.</div>`;
    return;
  }

  window._libSelectedRows=new Set();
  window._libRows=rows;

  window.updateLibBulkBar=function(){
    const bar=document.getElementById('lib-bulk-bar');
    if(!bar) return;
    const n=window._libSelectedRows.size;
    if(n>0){
      bar.style.display='block';
      bar.textContent='📋 Solicitar liberación (' + n + ' seleccionadas)';
    } else {
      bar.style.display='none';
    }
  };

  window.toggleLibSelection=function(idx){
    if(window._libSelectedRows.has(idx)) window._libSelectedRows.delete(idx);
    else window._libSelectedRows.add(idx);
    const cb=document.getElementById('lib-cb-'+idx);
    const card=document.getElementById('lib-card-'+idx);
    if(cb) cb.checked=window._libSelectedRows.has(idx);
    if(card) card.style.outline=window._libSelectedRows.has(idx)?'2px solid var(--accent)':'none';
    window.updateLibBulkBar();
  };

  window.requestBulkLiberation=function(){
    if(!window._libSelectedRows.size) return;
    const selected=[...window._libSelectedRows].map(i=>allRows.indexOf(window._libRows[i]));
    openBulkMailModal(selected,'solicitar_liberacion');
  };

  let html=`
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">Cargas próximas</div><div class="stat-value">${rows.length}</div><div class="stat-sub">ETA ≤ 7 días</div></div>
    <div class="stat-card alert-card"><div class="stat-label">Sin liberación</div><div class="stat-value" style="color:#ff6b35">${rows.filter(r=>!(r[COL.TELEX]||'').trim()).length}</div><div class="stat-sub">TELEX vacío</div></div>
    <div class="stat-card warn-card"><div class="stat-label">En proceso</div><div class="stat-value" style="color:var(--warn)">${rows.filter(r=>{const t=(r[COL.TELEX]||'').trim();return t&&t.toUpperCase()!=='SI';}).length}</div><div class="stat-sub">Solicitado / pendiente</div></div>
    <div class="stat-card"><div class="stat-label">Liberado</div><div class="stat-value" style="color:var(--ok)">${rows.filter(r=>(r[COL.TELEX]||'').trim().toUpperCase()==='SI').length}</div><div class="stat-sub">TELEX = SI</div></div>
  </div>
  <button style="display:none;position:sticky;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0d0d0d;padding:10px 24px;border-radius:30px;font-weight:700;font-size:13px;cursor:pointer;z-index:20;box-shadow:0 4px 20px rgba(0,0,0,.5);border:none;font-family:var(--font);" id="lib-bulk-bar" onclick="requestBulkLiberation()"></button>
  <div class="alert-list">`;

  rows.forEach((row, localIdx)=>{
    const origIdx=allRows.indexOf(row);
    const d=daysFrom(row[COL.ETA]);
    const dc=daysClass(d);
    const telex=(row[COL.TELEX]||'').trim();
    const telexOk=telex.toUpperCase()==='SI';
    const telexPending=telex&&!telexOk;
    const customer=(row[COL.CUSTOMER]||'—').trim();
    const bl=(row[COL.BL]||'').trim();
    const booking=(row[COL.BOOKING]||'').trim();
    const containers=(row[COL.CONTAINERS]||'').trim();
    const shipping=(row[COL.SHIPPING]||'').trim();
    const vessel=(row[COL.VESSEL]||'').trim();
    const port=(row[COL.PORT]||'').trim();
    const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
    const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();
    const pagFirm=(row[COL.PAGARE_FIRMADO]||'').trim().toUpperCase();
    const invoiceStr=inv1&&inv2?`${inv1} / ${inv2}`:inv1||inv2||'—';
    const cardTitle=`${booking||bl} · ${invoiceStr!=='—'?invoiceStr:''} · ${customer}`.replace(' ·  ·',' ·').trim().replace(/· $/,'').trim();
    const recInfo=getReclamoInfoFromLog(bl,'solicitar_liberacion');

    const level=telexOk?'info':d<=3?'critical':'warning';
    const telexHtml=telexOk
      ?`<div style="margin-bottom:8px;font-family:var(--mono);font-size:11px;color:var(--ok);">✓ Liberado: ${telex}</div>`
      :telexPending
        ?`<div style="margin-bottom:8px;font-family:var(--mono);font-size:11px;color:var(--info);">📋 Estado: ${telex}</div>`
        :`<div style="margin-bottom:8px;font-family:var(--mono);font-size:11px;color:#ff6b35;">⚠ Sin liberación solicitada</div>`;
    const pagHtml=`<div style="margin-bottom:8px;font-family:var(--mono);font-size:11px;color:${pagFirm==='SI'?'var(--ok)':'var(--warn)'};">${pagFirm==='SI'?'✓ Pagaré firmado':'⚠ Pagaré NO firmado'}</div>`;
    const recHtml=recInfo?`<div class="alert-reclamo">⚠ Solicitado ${recInfo.count} vez${recInfo.count>1?'es':''} · último ${recInfo.timeStr}</div>`:'';
    const actionBtn=!telexOk
      ?`<button class="action-btn write" onclick="openMailModal(${origIdx},'solicitar_liberacion')">📋 Solicitar liberación</button>`
      :'<span style="color:var(--ok);font-size:11px;font-weight:600">✓ Liberado</span>';

    html+=`<div class="alert-item ${level}" id="lib-card-${localIdx}" style="cursor:pointer;transition:border-color .15s;" onclick="toggleLibSelection(${localIdx})">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;">
        <input type="checkbox" class="lib-checkbox" id="lib-cb-${localIdx}" onclick="event.stopPropagation();toggleLibSelection(${localIdx})" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer;">
        <div class="alert-dot ${level}"></div>
      </div>
      <div class="alert-body">
        <div class="alert-title">${cardTitle}</div>
        <div class="alert-meta">BL: ${bl}  ·  ETA: ${fmtDate(row[COL.ETA])}</div>
        <div class="alert-tags">
          <span class="tag customer">${customer}</span>
          <span class="tag vessel">${vessel}</span>
          <span class="tag port">${port}</span>
          <span class="tag naviera">${shipping}</span>
          <span class="tag days-${dc}">${d===0?'HOY':d+'d'}</span>
        </div>
        <div class="alert-logistics">
          <div class="log-item"><span class="log-label">Containers:</span><span class="log-value">${containers||'—'}</span></div>
          <div class="log-item"><span class="log-label">Booking:</span><span class="log-value">${booking||'—'}</span></div>
          <div class="log-item"><span class="log-label">BL:</span><span class="log-value">${bl||'—'}</span></div>
          <div class="log-item"><span class="log-label">Naviera:</span><span class="log-value">${shipping||'—'}</span></div>
        </div>
        ${pagHtml}${telexHtml}${recHtml}
        <div class="alert-actions" onclick="event.stopPropagation()">${actionBtn}</div>
      </div>
      <div class="alert-right">
        <div class="days-badge ${dc}" style="font-size:28px">${d}</div>
        <div class="days-label" style="color:var(--muted2);font-weight:700">DÍAS ETA</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('content').innerHTML=html;
}

async function renderLog(){
  if(!accessToken){
    document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div style="margin-bottom:16px;">Conectate con Google para ver el log de acciones.</div><button class="btn primary" onclick="handleAuth()">Conectar con Google</button></div>`;
    return;
  }
  document.getElementById('content').innerHTML=`<div class="spinner"><div class="spin"></div> Cargando log...</div>`;
  try{
    const hubId=cfg.hubSheetId||cfg.sheetId;
    const range=encodeURIComponent(`LOG!A:I`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${hubId}/values/${range}?key=${cfg.apiKey}`;
    const r=await fetch(url);
    const data=await r.json();
    const rows=(data.values||[]).slice(1).reverse(); // Más recientes primero
    if(!rows.length){document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">📋</div>Sin acciones registradas todavía.</div>`;return;}
    let html=`<div class="table-wrap"><div class="table-top"><span style="font-size:13px;font-weight:700;">${rows.length} acciones registradas</span></div><div style="overflow-x:auto;"><table>
      <thead><tr><th>Fecha</th><th>Hora</th><th>Fuente</th><th>FC</th><th>FC Servicios</th><th>BL</th><th>Customer</th><th>Acción</th><th>Detalle</th></tr></thead><tbody>`;
    rows.forEach(row=>{
      const accion=(row[7]||'').trim();
      const color=accion.includes('reclamo')||accion.includes('cobro')?'var(--warn)':accion.includes('liberac')?'var(--info)':'var(--muted2)';
      html+=`<tr>
        <td class="mono">${row[0]||'—'}</td>
        <td class="mono">${row[1]||'—'}</td>
        <td><span style="color:var(--accent);font-size:10px;font-family:var(--mono)">${row[2]||'AXT'}</span></td>
        <td class="mono">${row[3]||'—'}</td>
        <td class="mono">${row[4]||'—'}</td>
        <td class="mono">${(row[5]||'—').substring(0,20)}</td>
        <td>${row[6]||'—'}</td>
        <td><span style="color:${color};font-size:11px;font-weight:600">${accion||'—'}</span></td>
        <td style="color:var(--muted2);font-size:11px">${row[8]||'—'}</td>
      </tr>`;
    });
    html+=`</tbody></table></div></div>`;
    document.getElementById('content').innerHTML=html;
  }catch(e){document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-icon">⚠</div>Error al cargar el log.</div>`;}
}

      en:{subject:`Request: pending documents – ${d.negocio} / BL: ${d.bl}`,body:`${hi},\n\nWe are still awaiting the following documents for:\n\nShipment: ${d.negocio}\nCustomer: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\n\nPending: ${d.docsNote||'– Documents pending'}\n\nPlease send at your earliest convenience.\n\n${bye}`},
      es:{subject:`Solicitud de documentos pendientes – ${d.negocio} / BL: ${d.bl}`,body:`${hi},\n\nAún aguardamos la siguiente documentación para:\n\nNegocio: ${d.negocio}\nCliente: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\n\nPendiente: ${d.docsNote||'– Documentos pendientes'}\n\nSolicitamos envío a la brevedad.\n\n${bye}`}
    },
    solicitar_pagare:{
      en:{subject:`Promissory note – ${d.negocio} / BL: ${d.bl}`,body:`${hi},\n\nWe kindly request the signing and return of the promissory note for:\n\nShipment: ${d.negocio}\nCustomer: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nVessel: ${d.vessel}\nETA: ${d.etaFmt}${invLine}\n\n${bye}`},
      es:{subject:`Pagaré – ${d.negocio} / BL: ${d.bl}`,body:`${hi},\n\nLe solicitamos la firma y devolución del pagaré correspondiente al siguiente embarque:\n\nNegocio: ${d.negocio}\nCliente: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nBuque: ${d.vessel}\nETA: ${d.etaFmt}${invLine}\n\n${bye}`}
    },
    reclamo_cobro:{
      en:{subject:`Payment inquiry – ${d.inv1&&d.inv2?d.inv1+' / '+d.inv2:d.inv1||d.inv2||d.bl}`,body:`Dear,\n\nWe wish to follow up on the outstanding payment for:\n\nCustomer: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nPayment due date: ${d.paymentDueFmt}${invLine}\n\nPlease confirm status of payment.\n\n${bye}`},
      es:{subject:`Consulta de pago – ${d.inv1&&d.inv2?d.inv1+' / '+d.inv2:d.inv1||d.inv2||d.bl}`,body:`Estimado/a,\n\nNos comunicamos para hacer seguimiento del pago pendiente de:\n\nCliente: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nFecha de pago estimada: ${d.paymentDueFmt}${invLine}\n\nAgradecemos confirmar estado del pago.\n\n${bye}`}
    },
    solicitar_liberacion:{
      en:{subject:`Release request - ${d.exporter||d.customer} - AXT - ETA ${d.etaFmt}`,body:`Dear,\n\nWe kindly request the release of the following shipment:\n\nExporter: ${d.exporter||d.customer}\nCustomer: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nVessel: ${d.vessel}\nPort: ${d.port}\nETA: ${d.etaFmt}\n\n@Pedro Berro Madero Please confirm to proceed with the release.\n\nBest regards,\nLATINUT S.A.`},
      es:{subject:`Solicitud de liberacion - ${d.exporter||d.customer} - AXT - ETA ${d.etaFmt}`,body:`Estimado/a,\n\nSolicitamos la liberacion del siguiente embarque:\n\nExporter: ${d.exporter||d.customer}\nCliente: ${d.customer}\nBL: ${d.bl}\nBooking: ${d.booking}\nContainer(s): ${d.containers}\nBuque: ${d.vessel}\nPuerto: ${d.port}\nETA: ${d.etaFmt}\n\n@Pedro Berro Madero Por favor, dar el ok para proceder con la liberacion.\n\nQuedamos a la espera de confirmacion.\n\nSaludos,\nLATINUT S.A.`}
    }
  };
  return tpls[mailType]?.[lang]||tpls[mailType]?.en||{subject:'',body:''};
}

function openBulkMailModal(rowIndices, mailType){
  if(!rowIndices.length) return;
  const rows=rowIndices.map(i=>allRows[i]);
  
  // Get exporter from first row (col S=18)
  const exporter=(rows[0][COL.EXPORTER]||'').trim();
  // Get earliest ETA
  const etas=rows.map(r=>r[COL.ETA]).filter(Boolean).sort();
  const etaStr=etas.length?fmtDate(etas[0]):'—';

  // Build each shipment block
  const lines=rows.map(row=>{
    const bl=(row[COL.BL]||'').trim();
    const booking=(row[COL.BOOKING]||'').trim();
    const containers=(row[COL.CONTAINERS]||'').trim();
    const vessel=(row[COL.VESSEL]||'').trim();
    const port=(row[COL.PORT]||'').trim();
    const eta=fmtDate(row[COL.ETA]);
    const exp=(row[COL.EXPORTER]||exporter).trim();
    return `Exporter: ${exp}\nBL: ${bl}\nBooking: ${booking}\nContainer(s): ${containers}\nBuque: ${vessel}\nPuerto: ${port}\nETA: ${eta}`;
  }).join('\n\n');

  const subject=`Solicitud de liberaciones - ${exporter} - AXT - ETA ${etaStr}`;
  const body=`Estimado/a,\n\nSolicitamos la liberacion de los siguientes embarques:\n\n${lines}\n\n@Pedro Berro Madero Por favor, dar el ok para proceder con la liberacion.\n\nQuedamos a la espera de confirmacion.\n\nSaludos,\nLATINUT S.A.`;

  const transcargo=getContactsForEmpresa('Transcargo');
  const ccSiempreAll=contacts.filter(c=>c.ccSiempre).map(c=>c.email);
  const libCC=ccSiempreAll.length?ccSiempreAll.join(', '):'pberro@axtsolutions.com';

  modalData={rowIndices, mailType, isBulk:true, exporter, rows};
  document.getElementById('lang-en').classList.remove('active');
  document.getElementById('lang-es').classList.add('active');
  document.getElementById('modal-title').textContent=`Liberación masiva — ${rows.length} cargas`;
  document.getElementById('modal-to').textContent=transcargo.to||'Thomas Laurenti <tlaurenti@transcargoarg.com>';
  document.getElementById('modal-cc').textContent=libCC;
  document.getElementById('modal-subject').textContent=subject;
  document.getElementById('modal-body').value=body;
  const btn=document.getElementById('send-draft-btn');
  btn.textContent=`📋 Solicitar ${rows.length} liberaciones + Draft`;
  document.getElementById('mail-modal').classList.remove('hidden');
}


function openMailModal(rowIdx, mailType){
  const row=allRows[rowIdx];
  if(!row) return;
  const d={
    negocio:(row[COL.NEGOCIO]||'').trim(),
    bl:(row[COL.BL]||'').trim(),
    booking:(row[COL.BOOKING]||'').trim(),
    containers:(row[COL.CONTAINERS]||'').trim(),
    shipping:(row[COL.SHIPPING]||'').trim(),
    customer:(row[COL.CUSTOMER]||'').trim(),
    exporter:(row[COL.EXPORTER]||'').trim(),
    vessel:(row[COL.VESSEL]||'').trim(),
    port:(row[COL.PORT]||'').trim(),
    etaFmt:fmtDate(row[COL.ETA]),
    paymentDueFmt:fmtDate(row[COL.FECHA_EST_COBRO]),
    invoiceInfo:getInvoiceInfo(row),
    docsNote:(row[COL.DOCUMENTOS]||'').trim(),
    inv1:(row[COL.INVOICE_CLIENTE]||'').trim(),
    inv2:(row[COL.INVOICE_FC_SERV]||'').trim()
  };
  currentLang=mailType==='solicitar_liberacion'?'es':'en';
  modalData={rowIdx,mailType,d};
  document.getElementById('lang-en').classList.toggle('active',currentLang==='en');
  document.getElementById('lang-es').classList.toggle('active',currentLang==='es');
  document.getElementById('modal-title').textContent='Borrador — '+mailType.replace(/_/g,' ');
  let toStr, ccStr;
  if(mailType==='solicitar_liberacion'){
    const transcargo=getContactsForEmpresa('Transcargo');
    toStr=transcargo.to||'Thomas Laurenti <tlaurenti@transcargoarg.com>';
    const ccSiempre=contacts.filter(c=>c.ccSiempre).map(c=>c.email);
    ccStr=ccSiempre.length?ccSiempre.join(', '):'pberro@axtsolutions.com';
  } else {
    const contactInfo=getContactsForEmpresa(d.customer);
    toStr=contactInfo.to||`${d.customer} <sin contacto cargado>`;
    ccStr=contactInfo.cc||'pedro@axt.com';
  }
  document.getElementById('modal-to').textContent=toStr;
  document.getElementById('modal-cc').textContent=ccStr;
  const tpl=buildMailBody(mailType,d,'en');
  document.getElementById('modal-subject').textContent=tpl.subject;
  document.getElementById('modal-body').value=tpl.body;

  // Si es liberación, cambiar botón
  const btn=document.getElementById('send-draft-btn');
  if(mailType==='solicitar_liberacion'){
    btn.textContent='📋 Marcar como solicitado + Draft';
  } else {
    btn.textContent='✉ Crear borrador en Gmail';
  }
  document.getElementById('mail-modal').classList.remove('hidden');
}

function setLang(lang){
  currentLang=lang;
  document.getElementById('lang-en').classList.toggle('active',lang==='en');
  document.getElementById('lang-es').classList.toggle('active',lang==='es');
  const tpl=buildMailBody(modalData.mailType,modalData.d,lang);
  document.getElementById('modal-subject').textContent=tpl.subject;
  document.getElementById('modal-body').value=tpl.body;
}

function closeModal(){document.getElementById('mail-modal').classList.add('hidden');}

async function sendDraft(){
  const subject=document.getElementById('modal-subject').textContent;
  const body=document.getElementById('modal-body').value;
  const to=document.getElementById('modal-to').textContent;
  const cc=document.getElementById('modal-cc').textContent;
  const {mailType,d,rowIdx,isBulk,rowIndices,rows:bulkRows}=modalData;

  // Crear draft en Gmail
  await createGmailDraft(to, cc, subject, body);

  if(isBulk && rowIndices){
    // Bulk liberation
    for(let i=0;i<rowIndices.length;i++){
      const ri=rowIndices[i];
      const row=allRows[ri];
      const bl=(row[COL.BL]||'').trim();
      const inv1=(row[COL.INVOICE_CLIENTE]||'').trim();
      const inv2=(row[COL.INVOICE_FC_SERV]||'').trim();
      saveReclamo(bl, mailType);
      const writeOk=await writeCell(ri, COL.TELEX, 'solicitado, falta ok');
      console.log('writeCell row',ri,'col',COL.TELEX,'result:',writeOk);
      await appendLog({
        fuente:'AXT',
        fc: inv1||'',
        fcServ: inv2||'',
        bl,
        customer:(row[COL.CUSTOMER]||'').trim(),
        accion:'solicitar liberacion (bulk)',
        detalle: subject
      });
    }
    showToast(`✓ ${rowIndices.length} TELEX actualizados en planilla`);
  } else if(d){
    // Single
    saveReclamo(d.bl, mailType);
    if(mailType==='solicitar_liberacion'){
      const ok=await writeCell(rowIdx, COL.TELEX, 'solicitado, falta ok');
      if(ok) showToast('✓ TELEX actualizado en planilla');
    }
    await appendLog({
      fuente:'AXT',
      fc: d.inv1||d.negocio,
      fcServ: d.inv2||'',
      bl: d.bl,
      customer: d.customer,
      accion: mailType.replace(/_/g,' '),
      detalle: subject
    });
  }

  closeModal();
  await loadLog();
  setTimeout(()=>renderView(currentView), 500);
}
